<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="アクアリンク経営発展記">
<meta name="theme-color" content="#D8D2C5">
<title>アクアリンク経営発展記</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
:root{
  --sky:#C9DDD8;
  --sky2:#A8C4C0;
  --grass:#B8C9A8;
  --grass2:#9CB088;
  --grass3:#7A8C66;
  --cream:#EFE6D5;
  --cream2:#E0D4BE;
  --pink:#D4A8B5;
  --pink2:#C9909C;
  --pinkdk:#8A4858;
  --blue:#A8B8C9;
  --blue2:#7A8CA0;
  --bluedk:#3A4C5C;
  --green:#9CB088;
  --green2:#7A8C66;
  --greendk:#3A4C30;
  --lavender:#9C8AB8;
  --lavender2:#7A6890;
  --lavenderdk:#5C4A78;
  --yellow:#D4B868;
  --yellow2:#A88E48;
  --yellowdk:#5C4A20;
  --beige:#D4C0A0;
  --beige2:#B8A088;
  --beigedk:#7A6048;
  --woodlt:#C8A878;
  --wood:#9C7A5A;
  --wooddk:#7A5A3A;
  --woodbg:#6B5A48;
  --woodxd:#3D2F22;
  --paper:#FFF8E8;
  --paper2:#F5E8D0;
  --ink:#3D352B;
  --ink2:#5C4A38;
  --ink3:#7A6A56;
  --shadow:#8A7A66;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{
  height:100%;overflow:hidden;background:var(--sky);
  color:var(--ink);
  font-family:'M PLUS Rounded 1c','Hiragino Maru Gothic ProN',sans-serif;
}
body{display:flex;flex-direction:column;}

.hud{
  background:var(--cream);
  border-bottom:3px solid var(--woodbg);
  padding:10px 14px;
  display:flex;align-items:center;gap:10px;
  flex-shrink:0;z-index:20;
  box-shadow:0 3px 0 var(--shadow);
  position:relative;
}
.hud-title{
  font-weight:900;font-size:13px;color:var(--woodbg);
  flex:1;letter-spacing:.02em;
}
.hud-title:before{
  content:"🏢";margin-right:5px;font-size:11px;
}
.hud-month{
  font-weight:700;font-size:11px;
  color:var(--ink2);background:var(--paper);
  padding:5px 11px;border:2px solid var(--woodbg);
  border-radius:99px;
  box-shadow:0 2px 0 var(--shadow);
}
.hud-coin{
  display:flex;align-items:center;gap:5px;
  font-weight:700;font-size:12px;color:var(--ink2);
  background:var(--paper);
  padding:4px 10px;border:2px solid var(--woodbg);
  border-radius:99px;
  box-shadow:0 2px 0 var(--shadow);
}
.hud-coin-icon{
  width:14px;height:14px;background:var(--yellow);
  border:1.5px solid var(--yellow2);
  border-radius:50%;flex-shrink:0;
}

.page{display:none;flex:1;overflow-y:auto;overflow-x:hidden;position:relative;}
.page.active{display:block;}
.page::-webkit-scrollbar{width:0;}

.village{
  background:linear-gradient(to bottom,
    #87CEEB 0%, #98D8E8 35%,
    #B8E0EC 50%,
    #7BC85C 60%, #5BA84C 100%);
  min-height:380px;
  position:relative;
  border-bottom:3px solid var(--woodbg);
  padding:14px 12px 4px;
  overflow:hidden;
}
.village:before{
  content:"";position:absolute;
  left:0;right:0;top:55%;height:45%;
  background:
    linear-gradient(to bottom,#7BC85C 0%,#5BA84C 50%,#3D8A38 100%);
  z-index:0;
}
.village:after{
  content:"";position:absolute;
  left:-10%;right:-10%;bottom:-20px;height:40%;
  background:
    radial-gradient(ellipse at 20% 100%, #6B8C5C 0%, transparent 60%),
    radial-gradient(ellipse at 80% 100%, #6B8C5C 0%, transparent 60%);
  z-index:0;
}

.mountain{
  position:absolute;z-index:1;
  bottom:38%;
}
.mountain svg{display:block;}

.cloud{
  position:absolute;background:#FFFFFF;border-radius:20px;
  box-shadow:
    -10px 4px 0 -2px #FFFFFF, 12px 4px 0 -2px #FFFFFF,
    -16px -2px 0 -3px #FFFFFF, 14px -3px 0 -2px #FFFFFF;
  width:30px;height:12px;z-index:2;opacity:.95;
}
.sun{display:none;}

.tree{
  position:absolute;z-index:2;
  bottom:8px;width:40px;height:60px;
}
.tree svg{width:100%;height:100%;display:block;}

.skybuilding{display:none;}
.tokyo-station{display:none;}
.gingko{display:none;}
.taxi{display:none;}

.hq-stage{
  position:relative;width:200px;height:200px;
  margin:0 auto -20px;z-index:3;
  animation:floatIsland 5s ease-in-out infinite;
}
@keyframes floatIsland{
  0%,100%{transform:translateY(0px);}
  50%{transform:translateY(-10px);}
}
.hq-stage svg{
  width:100%;height:100%;display:block;
  filter:drop-shadow(3px 6px 0 rgba(0,0,0,.18));
}
.hq-banner{
  position:absolute;top:8px;left:50%;transform:translateX(-50%);
  background:#FFF8E1;color:#5C3A1F;
  font-weight:900;font-size:11px;
  padding:5px 14px;border:2.5px solid #5C3A1F;
  border-radius:10px;white-space:nowrap;z-index:4;
  box-shadow:0 3px 0 #8A6048, 0 4px 0 0 #5C3A1F;
}
.hq-banner i{font-size:11px;color:#A85050;margin-right:3px;}

.party-stage{
  display:flex;justify-content:space-around;align-items:flex-end;
  position:relative;z-index:3;padding:6px 4px 12px;
}
.npc{
  position:relative;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;
  transition:transform .12s;
}
.npc:active{transform:translateY(-3px) scale(.97);}
.npc svg{
  width:80px;height:108px;display:block;
  filter:drop-shadow(2px 4px 0 rgba(0,0,0,.2));
}
.npc-platform{
  position:absolute;bottom:38px;left:50%;
  transform:translateX(-50%);
  width:64px;height:14px;
  border-radius:50%;
  z-index:-1;
  filter:drop-shadow(0 2px 2px rgba(0,0,0,.2));
}
.npc[data-dept="sales"] .npc-platform{background:radial-gradient(ellipse,#7AB5DC 0%,#5C8AB5 100%);}
.npc[data-dept="install"] .npc-platform{background:radial-gradient(ellipse,#E8B848 0%,#A88828 100%);}
.npc[data-dept="mainte"] .npc-platform{background:radial-gradient(ellipse,#C95858 0%,#9C3838 100%);}
.npc-tag{
  background:#FFF8E1;color:#3D2010;
  font-weight:900;font-size:11px;
  padding:4px 11px;border:2.5px solid #5C3A1F;
  border-radius:10px;
  margin-top:5px;white-space:nowrap;
  box-shadow:0 3px 0 #8A6048;
  display:flex;align-items:center;gap:5px;
}
.npc-tag .lv{
  font-size:10px;color:#A85050;font-weight:900;
}
.flower{display:none;}

.hq-stage{
  position:relative;width:160px;height:160px;
  margin:0 auto 4px;z-index:3;
}
.hq-stage svg{width:100%;height:100%;display:block;
  filter:drop-shadow(2px 4px 0 rgba(0,0,0,.12));
}
.hq-banner{
  position:absolute;top:-2px;left:50%;transform:translateX(-50%);
  background:var(--paper);color:var(--ink2);
  font-weight:700;font-size:10px;
  padding:4px 11px;border:2px solid var(--woodbg);
  border-radius:99px;white-space:nowrap;z-index:4;
  box-shadow:0 2px 0 var(--shadow);
  max-width:90%;
}
.hq-banner i{font-size:11px;color:var(--yellow2);margin-right:3px;}

.party-stage{
  display:flex;justify-content:space-around;align-items:flex-end;
  position:relative;z-index:3;padding:6px 4px 6px;
}
.npc{
  position:relative;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;
  transition:transform .12s;
}
.npc:active{transform:translateY(-3px) scale(.97);}
.npc svg{
  width:78px;height:104px;display:block;
  filter:drop-shadow(2px 3px 0 rgba(0,0,0,.15));
}
.npc-tag{
  background:var(--paper);color:var(--ink2);
  font-weight:700;font-size:11px;
  padding:3px 10px;border:2px solid var(--woodbg);
  border-radius:99px;
  margin-top:3px;white-space:nowrap;
  box-shadow:0 2px 0 var(--shadow);
  display:flex;align-items:center;gap:5px;
}
.npc-tag .lv{
  font-size:9px;color:var(--yellow2);font-weight:900;
}

.panel{
  background:var(--paper);
  border:2.5px solid var(--woodbg);
  margin:12px;padding:0;
  position:relative;
  border-radius:18px;
  box-shadow:0 4px 0 var(--shadow);
  overflow:hidden;
}
.panel-h{
  background:var(--cream);
  color:var(--ink2);
  font-weight:700;font-size:13px;
  padding:8px 14px;
  border-bottom:2px solid var(--woodbg);
  letter-spacing:.03em;
  display:flex;align-items:center;gap:7px;
}
.panel-h i{
  font-size:15px;color:var(--woodbg);
  background:var(--yellow);
  padding:3px;border-radius:50%;
  border:1.5px solid var(--yellow2);
}
.panel-body{padding:11px;}

.kgi-row{
  background:var(--paper2);
  border:2px solid var(--woodbg);
  padding:9px 12px;margin-bottom:6px;
  display:flex;align-items:center;gap:10px;
  border-radius:14px;
  box-shadow:0 2px 0 var(--shadow);
}
.kgi-row:last-child{margin-bottom:0;}
.kgi-row.warn{border-color:var(--yellow2);background:#F5E6C8;}
.kgi-row.bad{border-color:var(--pink2);background:#F0DCDC;}
.kgi-info{flex:1;min-width:0;}
.kgi-lbl{
  font-size:11px;color:var(--ink3);font-weight:500;
}
.kgi-val{
  display:flex;align-items:baseline;gap:6px;margin-top:3px;
}
.kgi-num{
  font-size:17px;font-weight:900;
  color:var(--green2);line-height:1;
}
.kgi-row.warn .kgi-num{color:var(--yellow2);}
.kgi-row.bad .kgi-num{color:var(--pinkdk);}
.kgi-target{
  font-size:10px;font-weight:500;color:var(--ink3);
}
.kgi-pct{
  font-size:13px;font-weight:900;
  color:var(--green2);min-width:40px;text-align:right;
}
.kgi-row.warn .kgi-pct{color:var(--yellow2);}
.kgi-row.bad .kgi-pct{color:var(--pinkdk);}

.mission{
  background:var(--paper2);
  border:2px solid var(--woodbg);
  padding:9px 12px;margin-bottom:6px;
  display:flex;align-items:flex-start;gap:10px;
  border-radius:14px;
  box-shadow:0 2px 0 var(--shadow);
}
.mission:last-child{margin-bottom:0;}
.mission.warn{border-color:var(--yellow2);background:#F5E6C8;}
.mission.bad{border-color:var(--pink2);background:#F0DCDC;}
.mission-icon{
  width:26px;height:26px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;color:var(--ink2);
  background:var(--yellow);border:1.5px solid var(--yellow2);
  border-radius:50%;
}
.mission.bad .mission-icon{background:var(--pink2);color:#fff;border-color:var(--pinkdk);}
.mission-body{flex:1;min-width:0;}
.mission-name{
  font-size:12px;font-weight:700;color:var(--ink);line-height:1.45;
}
.mission-sub{
  font-size:11px;color:var(--ink3);margin-top:3px;line-height:1.55;font-weight:500;
}
.mission-xp{
  font-size:10px;font-weight:900;
  color:var(--green2);background:#E0EAD0;
  padding:3px 8px;border:1.5px solid var(--green2);
  border-radius:99px;flex-shrink:0;align-self:center;
}

.det-back{
  display:flex;align-items:center;gap:7px;
  font-size:13px;font-weight:700;color:var(--ink2);
  background:var(--cream);
  padding:9px 14px;border-bottom:3px solid var(--woodbg);
  cursor:pointer;
}
.det-back i{
  font-size:16px;color:var(--ink2);
  background:var(--paper);
  padding:3px;border-radius:50%;
  border:1.5px solid var(--woodbg);
}
.det-back:active{background:var(--paper);}

.det-stage{
  background:linear-gradient(to bottom,
    #C0C5CA 0%, #C8CDD2 35%,
    #D8D2C5 55%, #5C544C 75%, #5C544C 100%);
  padding:16px 12px 18px;text-align:center;
  border-bottom:3px solid var(--woodbg);
  position:relative;overflow:hidden;
}
.det-stage .cloud{top:18px;}
.det-npc-svg{
  width:140px;height:188px;display:block;margin:0 auto;
  filter:drop-shadow(3px 4px 0 rgba(0,0,0,.18));
  position:relative;z-index:2;
}
.det-name-banner{
  background:var(--paper);color:var(--ink);
  font-weight:900;font-size:15px;
  padding:6px 16px;border:2.5px solid var(--woodbg);
  border-radius:99px;
  display:inline-block;margin-top:10px;
  box-shadow:0 3px 0 var(--shadow);
  position:relative;z-index:2;
}
.det-quote{
  background:var(--paper);border:2px solid var(--woodbg);
  padding:7px 14px;
  font-size:11px;color:var(--ink2);font-weight:500;
  display:inline-block;margin-top:9px;
  border-radius:14px;
  box-shadow:0 2px 0 var(--shadow);
  position:relative;z-index:2;
}
.det-quote:before{content:"💬 ";}

.det-lvl-row{
  display:flex;align-items:center;gap:9px;
  background:var(--cream);padding:10px 14px;
  border-bottom:3px solid var(--woodbg);
}
.det-lvl-lbl{
  font-size:10px;font-weight:900;color:var(--ink3);
  background:var(--paper);
  padding:4px 9px;border:1.5px solid var(--woodbg);
  border-radius:99px;
}
.det-lvl-num{
  font-size:18px;font-weight:900;color:var(--woodbg);
  min-width:24px;text-align:center;
}
.det-xp-bar{
  flex:1;height:14px;background:var(--cream2);
  border:2px solid var(--woodbg);
  border-radius:99px;
  position:relative;overflow:hidden;
}
.det-xp-bar-fill{
  height:100%;background:var(--green2);
  transition:width .6s cubic-bezier(.4,0,.2,1);
  border-radius:99px;
}
.det-xp-num{
  font-size:11px;font-weight:700;
  color:var(--ink2);
}

.kpi-cat-h{
  font-size:11px;font-weight:700;
  color:var(--woodbg);margin:9px 0 5px;letter-spacing:.04em;
  display:flex;align-items:center;gap:6px;
}
.kpi-cat-h:first-child{margin-top:0;}
.kpi-cat-h:before{
  content:"";width:10px;height:10px;
  background:var(--green2);
  border-radius:50%;
  display:inline-block;
}
.kpi-line{
  display:flex;align-items:center;gap:9px;
  background:var(--paper2);
  border:1.5px solid var(--woodbg);
  padding:8px 11px;margin-bottom:4px;
  border-radius:11px;
  cursor:pointer;
}
.kpi-line:active{background:var(--cream2);}
.kpi-line:last-child{margin-bottom:0;}
.kpi-line-name{
  flex:1;font-size:11px;font-weight:500;color:var(--ink);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.kpi-line-bar{
  flex:0 0 50px;height:8px;background:var(--cream2);
  border:1px solid var(--woodbg);
  border-radius:99px;position:relative;overflow:hidden;
}
.kpi-line-bar-fill{height:100%;transition:width .4s;border-radius:99px;}
.kpi-line-val{
  flex:0 0 46px;text-align:right;
  font-size:11px;font-weight:700;color:var(--ink);line-height:1;
}
.kpi-line-arrow{flex:0 0 10px;color:var(--ink3);font-size:11px;}

.mi-month-bar{
  background:var(--cream);
  display:flex;align-items:center;
  border-bottom:3px solid var(--woodbg);
}
.mi-month-arrow{
  background:var(--paper);color:var(--ink2);
  border:none;padding:11px 18px;
  font-size:14px;font-weight:900;
  cursor:pointer;
}
.mi-month-arrow:active{background:var(--cream2);}
.mi-month-name{
  flex:1;text-align:center;
  font-size:14px;font-weight:900;
  color:var(--ink);
  padding:11px;
}
.mi-month-name:before{content:"📅 ";}

.mi-section{
  background:var(--paper);border:2.5px solid var(--woodbg);
  margin:12px;padding:0;
  border-radius:18px;
  box-shadow:0 4px 0 var(--shadow);
  overflow:hidden;
}
.mi-section-h{
  background:var(--cream);color:var(--ink);
  font-weight:700;font-size:13px;
  padding:8px 12px;border-bottom:2px solid var(--woodbg);
  display:flex;align-items:center;gap:9px;
}
.mi-section-h .mi-color-tag{
  width:18px;height:18px;
  border:2px solid var(--woodbg);
  border-radius:50%;flex-shrink:0;
}
.mi-section-body{padding:11px;}
.mi-input-row{
  background:var(--paper2);border:1.5px solid var(--woodbg);
  padding:8px 11px;margin-bottom:5px;
  border-radius:11px;
  display:flex;align-items:center;gap:8px;
}
.mi-input-row:last-child{margin-bottom:0;}
.mi-input-name{
  flex:1;font-size:11px;font-weight:500;color:var(--ink);line-height:1.35;
}
.mi-input-prev{
  font-size:9px;font-weight:700;
  color:var(--ink3);flex-shrink:0;width:50px;text-align:right;
}
.mi-input-box{
  background:#fff;border:2px solid var(--woodbg);
  padding:5px 9px;width:80px;
  font-size:13px;font-weight:700;
  color:var(--ink);text-align:right;outline:none;
  border-radius:8px;flex-shrink:0;
  font-family:inherit;
}
.mi-input-box:focus{border-color:var(--green2);background:#FFFEF8;}
.mi-input-unit{
  font-size:11px;color:var(--ink3);flex-shrink:0;
  min-width:18px;font-weight:500;
}

.mi-progress{
  background:var(--cream);color:var(--ink);
  padding:11px 14px;margin:12px;
  border:2.5px solid var(--woodbg);
  border-radius:18px;
  display:flex;align-items:center;gap:10px;
  font-size:11px;font-weight:700;
  box-shadow:0 4px 0 var(--shadow);
}
.mi-progress i{
  font-size:14px;color:var(--green2);
  background:var(--paper);
  padding:3px;border-radius:50%;
  border:1.5px solid var(--green2);
}
.mi-progress-bar{
  flex:1;height:11px;background:var(--cream2);
  border:1.5px solid var(--woodbg);
  border-radius:99px;
  position:relative;overflow:hidden;
}
.mi-progress-bar-fill{
  height:100%;background:var(--green2);
  transition:width .4s cubic-bezier(.4,0,.2,1);
  border-radius:99px;
}
.mi-progress-num{font-size:11px;font-weight:900;color:var(--woodbg);}

.hist-tabs{
  display:flex;background:var(--cream);
  border-bottom:3px solid var(--woodbg);
  padding:6px 6px 0;gap:3px;
}
.hist-tab{
  flex:1;background:transparent;border:none;
  font-family:inherit;
  font-size:12px;font-weight:700;
  color:var(--ink3);padding:8px 4px;cursor:pointer;
  border:2px solid transparent;
  border-bottom:none;
  border-radius:11px 11px 0 0;
  margin-bottom:-3px;
}
.hist-tab.active{
  background:var(--paper);color:var(--woodbg);
  border-color:var(--woodbg);border-bottom:3px solid var(--paper);
}

.hist-stat-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:7px;
  padding:11px;background:var(--paper);
  border-bottom:3px solid var(--woodbg);
}
.hist-stat{
  background:var(--paper2);border:2px solid var(--woodbg);
  padding:9px 6px;text-align:center;
  border-radius:14px;
  box-shadow:0 2px 0 var(--shadow);
}
.hist-stat-val{
  font-size:14px;font-weight:900;color:var(--woodbg);
}
.hist-stat-lbl{font-size:10px;font-weight:500;color:var(--ink3);margin-top:3px;}

.hist-list{padding:11px;}
.hist-row{
  background:var(--paper2);border:2px solid var(--woodbg);
  padding:9px 12px;margin-bottom:5px;
  border-radius:14px;
  display:flex;align-items:center;gap:10px;
  box-shadow:0 2px 0 var(--shadow);
}
.hist-row-month{
  font-size:11px;font-weight:900;
  color:var(--ink2);width:50px;flex-shrink:0;
}
.hist-row-bar{
  flex:1;height:14px;background:var(--cream2);
  border:1px solid var(--woodbg);
  border-radius:99px;
  display:flex;overflow:hidden;
}
.hist-row-seg{height:100%;}
.hist-row-num{

.biz-param-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:8px;
}
.biz-param{
  background:var(--paper);border:2px solid var(--woodbg);

  box-shadow:0 2px 0 var(--shadow);
}

.biz-param-lbl{font-size:10px;color:var(--ink3);margin-top:2px;}
.biz-param.up{border-color:#1A6B2A;}
.biz-param.up .biz-param-val{color:#1A6B2A;}
.biz-param.down{border-color:#A82020;}
.biz-param.down .biz-param-val{color:#A82020;}

/* ── 会社ステータス ── */
.stat-row{

  font-size:11px;
}
.stat-name{width:60px;font-weight:700;color:var(--ink2);}

.crisis-tag{font-weight:900;font-size:10px;padding:2px 8px;border-radius:99px;}

/* ── 称号 ── */
.badges-grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:6px;
}
.badge-item{
  background:var(--paper);border:2px solid var(--woodbg);
  border-radius:8px;padding:6px 4px;text-align:center;
  box-shadow:0 2px 0 var(--shadow);
}
.badge-item.unlocked{

}
.badge-item.locked{opacity:.4;}
.badge-icon{font-size:18px;color:var(--woodbg);}
.badge-item.unlocked .badge-icon{color:#A85050;}
.badge-name{font-size:9px;font-weight:700;color:var(--ink2);margin-top:2px;line-height:1.2;}

.kgi-grade.A{background:#5BA84C;}
.kgi-grade.B{background:#D4A020;}
.kgi-grade.C{background:#D46820;}
.kgi-grade.D{background:#A82020;}

/* ── 月次レポート ── */

.report-grade{
  display:inline-block;font-weight:900;font-size:24px;
  padding:4px 14px;border-radius:8px;color:#fff;margin:6px 0;
}
.report-grade.S{background:#1A6B2A;}
.report-grade.A{background:#5BA84C;}
.report-grade.B{background:#D4A020;}
.report-grade.C{background:#D46820;}
.report-grade.D{background:#A82020;}
.report-section{margin-top:10px;padding-top:10px;border-top:1px dashed var(--woodbg);}
.report-section-h{font-size:11px;font-weight:900;color:var(--ink2);margin-bottom:6px;}
.report-row{display:flex;justify-content:space-between;font-size:11px;color:var(--ink2);margin-bottom:4px;line-height:1.5;}
.report-row.delta-up{color:#1A6B2A;}

.report-event{
  display:flex;align-items:center;gap:6px;
  padding:6px 8px;border-radius:6px;margin-bottom:4px;

}
.report-event.good{background:#E8F5DC;border-left:3px solid #5BA84C;}
.report-event.bad{background:#FCE0DC;border-left:3px solid #A82020;}

function getCurrentMonth() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
}

function fmtMonth(m) {
  return m.replace('-', '.');
}

function getMonthData(month) {

}

function setMonthValue(month, key, val) {
  if (!ST.data[month]) ST.data[month] = {};
  ST.data[month][key] = val;
}

function fmtVal(v, fmt) {
  if (v === undefined || v === null || v === '') return '--';
  if (fmt === 'currency') {
    const n = Number(v);
    if (n >= 1000000) return '+' + (n/1000000).toFixed(1) + 'M';
    if (n >= 1000) return Math.round(n/1000) + 'K';
    return Math.round(n).toLocaleString();
  }
  if (fmt === 'pct') return Number(v).toFixed(1) + '%';
  return Math.round(Number(v)).toLocaleString();
}

function calcKpiPct(item, val) {
  if (val === undefined || val === '' || val === null) return 0;
  const v = Number(val);
  const target = item.target;
  if (target === 0) {
    if (item.invert) return v === 0 ? 100 : Math.max(0, 100 - v * 10);
    return v > 0 ? 100 : 0;
  }
  if (item.invert) {
    return Math.max(0, Math.min(100, Math.round((1 - v / (target * 2)) * 100)));
  }
  return Math.max(0, Math.min(100, Math.round((v / target) * 100)));
}

function levelFromXp(xp) {
  if (xp < 100) return 1;
  if (xp < 250) return 2;
  if (xp < 500) return 3;
  if (xp < 900) return 4;
  if (xp < 1500) return 5;
  if (xp < 2300) return 6;
  if (xp < 3300) return 7;
  if (xp < 4500) return 8;
  if (xp < 6000) return 9;
  return 10;
}

function xpRange(xp) {
  const thresholds = [0,100,250,500,900,1500,2300,3300,4500,6000,9000];
  const lv = levelFromXp(xp);
  return { cur: xp - thresholds[lv-1], max: thresholds[lv] - thresholds[lv-1] };
}

function hqLevel() {

  if (totalXp < 6000) return 7;

}

// KGI判定 S/A/B/C/D
function gradeKgi(actual, target, invert) {
  if (actual === undefined || actual === null || actual === '') return null;
  let pct;
  if (invert) {
    if (actual <= target) return {grade:'S', pct:100, color:'#1A6B2A'};
    pct = Math.max(0, 100 - ((actual - target) / Math.max(target, 1)) * 100);
  } else {
    pct = (actual / target) * 100;
  }
  pct = Math.round(pct);
  if (pct >= 100) return {grade:'S', pct, color:'#1A6B2A'};
  if (pct >= 80) return {grade:'A', pct, color:'#5BA84C'};
  if (pct >= 60) return {grade:'B', pct, color:'#D4A020'};
  if (pct >= 40) return {grade:'C', pct, color:'#D46820'};
  return {grade:'D', pct:Math.max(0,pct), color:'#A82020'};
}

// 経営危機判定（連続未達月数で）
function getCrisisLevel(consecutiveMonths) {
  if (consecutiveMonths >= 4) return {level:'force', label:'強制改善', color:'#7A0E0E', bg:'#FCD9D9'};
  if (consecutiveMonths >= 3) return {level:'danger', label:'危機', color:'#A82020', bg:'#FCD9D9'};
  if (consecutiveMonths >= 2) return {level:'warn', label:'警戒', color:'#D46820', bg:'#FCE9C8'};
  if (consecutiveMonths >= 1) return {level:'caution', label:'注意', color:'#D4A020', bg:'#FCF6C8'};
  return null;
}

// 会社ステータス7種を計算（直近データから）
function computeCompanyStats() {
  const m = ST.input_month;
  const md = ST.data[m] || {};
  const stats = {sales_power:0, profit_power:0, quality_power:0, site_power:0, collect_power:0, bond_power:0, reward_power:0};

  function pct(actual, target, invert) {
    if (actual === undefined || actual === '' || actual === null) return null;
    if (invert) return actual <= target ? 100 : Math.max(0, 100 - ((actual-target)/Math.max(target,1))*100);
    return Math.min(100, (actual/target)*100);
  }
  function avg(...nums) {
    const valid = nums.filter(n => n !== null);
    if (!valid.length) return 0;
    return Math.round(valid.reduce((a,b)=>a+b,0)/valid.length);
  }

  // 売上力：新規月額純増・受注金額・商品売上
  stats.sales_power = avg(
    pct(md.sales_net, 500000),
    pct(md.sales_won_amt, 8000000),
    pct(md.mt_product_sales, 800000)
  );
  // 利益力：粗利率・実質純増利益・商品利益
  stats.profit_power = avg(
    pct(md.sales_gross, 45),
    pct(md.hq_profit, 10000000),
    pct(md.mt_profit, 1500000)
  );
  // 品質力：30日以内クレーム・品質解約・お客様満足度
  stats.quality_power = avg(
    pct(md.inst_complaint30, 0, true),
    pct(md.mt_quality_cancel, 0, true),
    pct(md.inst_satisfy, 90)
  );
  // 現場力：再訪問件数・追加発注件数
  stats.site_power = avg(
    pct(md.inst_revisit, 0, true),
    pct(md.inst_addorder, 0, true),
    pct(md.inst_done, 25)
  );
  // 回収力：契約書回収率・未納
  stats.collect_power = avg(
    pct(md.inst_contract, 100),
    pct(md.mt_unpaid_2m, 5, true)
  );
  // 連携力：メンテからの指摘数・3ヶ月以内クレーム
  stats.bond_power = avg(
    pct(md.inst_handback, 0, true),
    pct(md.sales_complaint3m, 0, true),
    pct(md.inst_photo, 100)
  );
  // 還元力：社員還元原資
  stats.reward_power = avg(
    pct(md.hq_reward, 2000000)
  );

  return stats;
}

// 経営資金変動を計算（実質純増利益に応じて増減）
function computeFundsDelta(monthData) {
  let delta = 0;
  const profit = monthData.hq_profit || 0;
  // 利益が出ていれば資金増、赤字なら減
  delta += Math.round((profit - 5000000) / 100000);
  // 解約金額が大きいと減
  if (monthData.mt_cancel_amt > 200000) delta -= Math.round((monthData.mt_cancel_amt - 200000)/50000);
  // 仕入割合超過
  if (monthData.mt_purchase_pct > 7.5) delta -= 30;
  // 未納増加
  if (monthData.mt_unpaid_2m > 5) delta -= 10;
  // 商品利益
  if (monthData.mt_profit > 1500000) delta += 20;
  return delta;
}

// 評判変動
function computeReputationDelta(monthData) {
  let delta = 0;
  if (monthData.inst_complaint30 === 0) delta += 5;
  if (monthData.inst_complaint30 > 0) delta -= monthData.inst_complaint30 * 3;
  if (monthData.mt_quality_cancel === 0) delta += 3;
  if (monthData.mt_quality_cancel > 0) delta -= monthData.mt_quality_cancel * 5;
  if (monthData.inst_satisfy >= 90) delta += 3;
  if (monthData.sales_complaint3m > 0) delta -= monthData.sales_complaint3m * 2;
  return delta;
}

// 社員満足度変動
function computeSatisfactionDelta(monthData) {
  let delta = 0;
  if (monthData.hq_reward >= 2000000) delta += 5;
  if (monthData.hq_profit >= 10000000) delta += 3;
  if (monthData.inst_complaint30 === 0) delta += 2;
  if (monthData.mt_quality_cancel > 0) delta -= 3;
  if (monthData.inst_revisit > 3) delta -= 2;
  return delta;
}

// 連続入力月数を計算
function computeConsecutiveMonths() {
  const months = Object.keys(ST.data).sort().reverse();
  let count = 0;
  let prev = null;
  for (const m of months) {
    const md = ST.data[m];
    if (!md || Object.keys(md).length === 0) break;
    if (prev) {
      const [py, pmm] = prev.split('-').map(Number);
      const [cy, cmm] = m.split('-').map(Number);
      const diff = (py * 12 + pmm) - (cy * 12 + cmm);
      if (diff !== 1) break;
    }
    count++;
    prev = m;
  }
  return count;
}

// 月次決算処理：パラメータ変動・イベント発生・称号獲得・レポート生成
function processMonthlyClose(month) {
  const md = ST.data[month] || {};
  if (Object.keys(md).length === 0) return null;

  const result = {month, events:[], badges:[], xpGain:0, fundsDelta:0, repDelta:0, satDelta:0};

  // 連続入力カウンター更新
  ST.consecutive_input = computeConsecutiveMonths();

  // 連続入力ボーナスXP
  let inputBonus = 0;
  if (ST.consecutive_input === 3) inputBonus = 300;
  else if (ST.consecutive_input === 6) inputBonus = 600;
  else if (ST.consecutive_input === 12) inputBonus = 1500;
  if (inputBonus > 0) {
    ST.xp.sales += Math.floor(inputBonus / 3);
    ST.xp.install += Math.floor(inputBonus / 3);
    ST.xp.mainte += Math.floor(inputBonus / 3);
    result.xpGain += inputBonus;
    result.events.push({type:'good', name:`${ST.consecutive_input}ヶ月連続入力ボーナス`, desc:`+${inputBonus} XP`});
  }

  // パラメータ変動
  result.fundsDelta = computeFundsDelta(md);
  result.repDelta = computeReputationDelta(md);
  result.satDelta = computeSatisfactionDelta(md);
  ST.funds = Math.max(0, ST.funds + result.fundsDelta);
  ST.reputation = Math.max(0, Math.min(100, ST.reputation + result.repDelta));
  ST.satisfaction = Math.max(0, Math.min(100, ST.satisfaction + result.satDelta));

  // KGI連続未達カウンター更新
  const kgiList = [
    {id:'sales_net', target:500000, invert:false},
    {id:'sales_gross', target:45, invert:false},
    {id:'inst_complaint30', target:0, invert:true},
    {id:'inst_costdiff', target:0, invert:false},
    {id:'mt_cancel_amt', target:200000, invert:true},
    {id:'mt_purchase_pct', target:7.5, invert:true},
    {id:'mt_profit', target:1500000, invert:false},
    {id:'hq_profit', target:10000000, invert:false},
    {id:'hq_reward', target:2000000, invert:false},
  ];
  for (const kgi of kgiList) {
    const v = md[kgi.id];
    if (v === undefined || v === '' || v === null) continue;
    const g = gradeKgi(v, kgi.target, kgi.invert);
    if (g && (g.grade === 'C' || g.grade === 'D' || g.grade === 'B')) {
      ST.monthly_kgi_status[kgi.id] = (ST.monthly_kgi_status[kgi.id] || 0) + 1;
    } else if (g && (g.grade === 'A' || g.grade === 'S')) {
      ST.monthly_kgi_status[kgi.id] = 0;
    }
  }

  // イベント発生判定
  for (const ev of GOOD_EVENTS) {
    try {
      if (ev.cond(md)) {
        result.events.push({type:'good', name:ev.name, desc:ev.desc, icon:ev.icon, color:ev.color});
      }
    } catch(e){}
  }
  for (const ev of BAD_EVENTS) {
    try {
      if (ev.cond(md)) {
        result.events.push({type:'bad', name:ev.name, desc:ev.desc, icon:ev.icon, color:ev.color});
      }
    } catch(e){}
  }

  // 称号獲得判定
  function award(badgeId) {
    if (!ST.badges.includes(badgeId)) {
      ST.badges.push(badgeId);
      const b = COMPANY_BADGES.find(x=>x.id===badgeId);
      if (b) result.badges.push(b);
    }
  }

  if (ST.consecutive_input >= 1) award('first_input');
  if (ST.consecutive_input >= 3) award('three_months');
  if (ST.consecutive_input >= 12) award('twelve_months');
  if (md.hq_profit !== undefined && md.hq_profit >= 10000000) award('profit_achieve');
  if (md.hq_reward !== undefined && md.hq_reward >= 2000000) award('reward_increase');
  if (md.mt_quality_cancel === 0) award('no_quality_cancel');
  if (md.mt_purchase_pct !== undefined && md.mt_purchase_pct <= 7.5 && md.mt_purchase_pct > 0) award('low_purchase');
  if (md.mt_profit !== undefined && md.mt_profit >= 1500000) award('product_profit');
  if (md.inst_handback === 0 && md.sales_complaint3m === 0) award('no_handover_issue');
  if (md.inst_complaint30 === 0 && md.inst_revisit === 0) award('on_time');

  const salesKgi = (md.sales_net >= 500000) && (md.sales_gross >= 45);
  const instKgi = (md.inst_complaint30 === 0) && (md.inst_costdiff !== undefined && md.inst_costdiff >= 0);
  const mainteKgi = (md.mt_cancel_amt !== undefined && md.mt_cancel_amt <= 200000) && (md.mt_purchase_pct <= 7.5) && (md.mt_profit >= 1500000);
  if (salesKgi && instKgi && mainteKgi) award('three_kgi');

  const completedQuests = ST.quests.filter(q => q.status === 'achieved').length;
  if (completedQuests >= 3) award('three_quests');

  // ステータス再計算
  ST.stats = computeCompanyStats();

  // レポート生成
  const report = generateMonthlyReport(month, md, result);
  result.report = report;

  // レポート履歴に保存
  ST.reports = ST.reports.filter(r => r.month !== month);
  ST.reports.unshift(report);
  if (ST.reports.length > 24) ST.reports = ST.reports.slice(0, 24);

  ST.last_input_month = month;
  save();
  return result;
}

// 月次レポート生成
function generateMonthlyReport(month, md, result) {
  // 総合評価
  const stats = ST.stats;
  const avgScore = (stats.sales_power + stats.profit_power + stats.quality_power + stats.site_power + stats.collect_power + stats.bond_power + stats.reward_power) / 7;
  let totalGrade = 'D';
  if (avgScore >= 85) totalGrade = 'S';
  else if (avgScore >= 70) totalGrade = 'A';
  else if (avgScore >= 50) totalGrade = 'B';
  else if (avgScore >= 30) totalGrade = 'C';

  // 一番良かった/悪かった数字
  const kgiResults = [];
  const kgiList = [
    {id:'sales_net', name:'新規月額純増', target:500000, invert:false},
    {id:'sales_gross', name:'粗利率', target:45, invert:false},
    {id:'inst_complaint30', name:'30日以内クレーム', target:0, invert:true},
    {id:'mt_cancel_amt', name:'解約金額', target:200000, invert:true},
    {id:'mt_purchase_pct', name:'純仕入割合', target:7.5, invert:true},
    {id:'mt_profit', name:'商品利益', target:1500000, invert:false},
    {id:'hq_profit', name:'実質純増利益', target:10000000, invert:false},
    {id:'hq_reward', name:'社員還元原資', target:2000000, invert:false},
  ];
  for (const k of kgiList) {
    const v = md[k.id];
    if (v === undefined || v === '' || v === null) continue;
    const g = gradeKgi(v, k.target, k.invert);
    if (g) kgiResults.push({name:k.name, pct:g.pct, grade:g.grade});
  }
  kgiResults.sort((a,b) => b.pct - a.pct);

  return {
    month,
    totalGrade,
    avgScore: Math.round(avgScore),
    bestKgi: kgiResults[0] || null,
    worstKgi: kgiResults[kgiResults.length-1] || null,
    kgiResults,
    events: result.events,
    badges: result.badges,
    xpGain: result.xpGain,
    fundsDelta: result.fundsDelta,

function renderCrisisAlert() {
  const panel = document.getElementById('crisis-panel');
  const list = document.getElementById('crisis-list');
  if (!panel || !list) return;
  const alerts = [];
  const kgiNames = {
    sales_net:'新規月額純増', sales_gross:'粗利率',
    inst_complaint30:'30日以内クレーム', inst_costdiff:'仕入差額',
    mt_cancel_amt:'解約金額', mt_purchase_pct:'純仕入割合',
    mt_profit:'商品利益', hq_profit:'実質純増利益', hq_reward:'社員還元原資',
  };
  for (const [kgiId, count] of Object.entries(ST.monthly_kgi_status)) {
    if (count >= 1) {
      const crisis = getCrisisLevel(count);
      if (crisis) {
        alerts.push({kgi:kgiNames[kgiId] || kgiId, count, crisis});
      }
    }
  }
  if (alerts.length === 0) {
    panel.style.display = 'none';
    return;
  }
  panel.style.display = '';
  list.innerHTML = alerts.map(a => `
    <div class="crisis-card" style="background:${a.crisis.bg};border-color:${a.crisis.color};">
      <div class="crisis-icon" style="color:${a.crisis.color};"><i class="ti ti-alert-triangle"></i></div>
      <div class="crisis-info">
        <div class="crisis-name" style="color:${a.crisis.color};">${a.kgi}</div>
        <div class="crisis-desc">${a.count}ヶ月連続で目標未達。原因を特定して改善アクションを登録してください。</div>
      </div>
      <div class="crisis-tag" style="background:${a.crisis.color};color:#fff;">${a.crisis.label}</div>
    </div>
  `).join('');
}

        <div class="report-row ${repClass}"><span>会社評判</span><span>${r.repDelta >= 0 ? '+' : ''}${r.repDelta}</span></div>
        <div class="report-row ${satClass}"><span>社員満足度</span><span>${r.satDelta >= 0 ? '+' : ''}${r.satDelta}</span></div>

function generateMissions() {
  const md = getMonthData(ST.current_month);
  const missions = [];
  Object.keys(DEPTS).forEach(deptKey => {
    const dept = DEPTS[deptKey];
    dept.kgi.concat(dept.kpi.flatMap(c=>c.items)).forEach(item => {
      const v = md[item.id];
      if (v === undefined || v === '') return;
      const pct = calcKpiPct(item, v);
      if (pct < 50) {
        missions.push({
          type: 'bad',
          icon: 'alert-triangle',
          name: dept.name + ' / ' + item.name,
          sub: '目標から大きく離れているので、改善が必要です',
          xp: 50,
        });
      } else if (pct < 70) {
        missions.push({
          type: 'warn',
          icon: 'alert-circle',
          name: dept.name + ' / ' + item.name,
          sub: '目標まであと少し。原因を見つけましょう',
          xp: 30,
        });
      }
    });
  });
  return missions.slice(0, 5);
}

function updateInputProgress() {
  const md = getMonthData(ST.input_month);
  let total = 0, filled = 0;
  HQ_KGI.forEach(k => { total++; if (md[k.id] !== undefined && md[k.id] !== '') filled++; });
  Object.keys(DEPTS).forEach(deptKey => {
    DEPTS[deptKey].kgi.concat(DEPTS[deptKey].kpi.flatMap(c=>c.items)).forEach(item => {
      total++;
      if (md[item.id] !== undefined && md[item.id] !== '') filled++;
    });
  });
  const pct = total > 0 ? Math.round(filled / total * 100) : 0;
  document.getElementById('input-progress-fill').style.width = pct + '%';
  document.getElementById('input-progress-num').textContent = filled + '/' + total;
}

function prevMonthOf(m) {
  const [y, mm] = m.split('-').map(Number);
  if (mm === 1) return (y-1) + '-12';
  return y + '-' + String(mm-1).padStart(2,'0');
}

function nextMonthOf(m) {
  const [y, mm] = m.split('-').map(Number);
  if (mm === 12) return (y+1) + '-01';
  return y + '-' + String(mm+1).padStart(2,'0');
}

function changeInputMonth(dir) {
  if (dir > 0) ST.input_month = nextMonthOf(ST.input_month);
  else ST.input_month = prevMonthOf(ST.input_month);
  save();
  renderInput();
}

function commitMonth() {
  const md = getMonthData(ST.input_month);
  let xpGain = { sales:0, install:0, mainte:0 };
  let levelUps = [];
  let bondMessages = [];

  Object.keys(DEPTS).forEach(deptKey => {
    const dept = DEPTS[deptKey];
    const allItems = dept.kgi.concat(dept.kpi.flatMap(c=>c.items));
    allItems.forEach(item => {
      const v = md[item.id];
      if (v === undefined || v === '') return;
      xpGain[deptKey] += 5;
      const pct = calcKpiPct(item, v);
      if (pct >= 100) xpGain[deptKey] += 50;
      else if (pct >= 80) xpGain[deptKey] += 30;
      else if (pct >= 60) xpGain[deptKey] += 10;
      else if (pct >= 40) xpGain[deptKey] += 5;
    });
  });

  generateQuestsFromData(md, ST.input_month);

  BONDS.forEach(bond => {
    const claimedKey = bond.id + '__' + ST.input_month;
    if (ST.bonds_claimed[claimedKey]) return;
    let bondXp = 0;
    let metCount = 0;
    bond.levels.forEach(lv => {
      if (lv.check(md)) {
        bondXp += lv.xp;
        metCount++;
      }
    });
    if (bondXp > 0) {
      ST.bonds_claimed[claimedKey] = { xp:bondXp, met:metCount, total:bond.levels.length };
      const splitXp = Math.round(bondXp / 3);
      xpGain.sales += splitXp;
      xpGain.install += splitXp;
      xpGain.mainte += splitXp;
      if (metCount === bond.levels.length) {
        bondMessages.push('🏆 ' + bond.title + ' 獲得！');
        if (!ST.badges.find(b => b.id === bond.id)) {
          ST.badges.push({id:bond.id, name:bond.title, dept:'bond', month:ST.input_month});
        }
      }
    }
  });

  const oldLevels = {
    sales: levelFromXp(ST.xp.sales),
    install: levelFromXp(ST.xp.install),
    mainte: levelFromXp(ST.xp.mainte),
    hq: hqLevel(),
  };

  ST.xp.sales += xpGain.sales;
  ST.xp.install += xpGain.install;
  ST.xp.mainte += xpGain.mainte;
  ST.current_month = ST.input_month;

  const newLevels = {
    sales: levelFromXp(ST.xp.sales),
    install: levelFromXp(ST.xp.install),
    mainte: levelFromXp(ST.xp.mainte),
    hq: hqLevel(),
  };

  ['sales','install','mainte'].forEach(d => {
    if (newLevels[d] > oldLevels[d]) levelUps.push({type:d, lv:newLevels[d]});
  });
  if (newLevels.hq > oldLevels.hq) levelUps.push({type:'hq', lv:newLevels.hq});

  if (!ST.history.includes(ST.input_month)) {
    ST.history.push(ST.input_month);
    ST.history.sort();
  }

  // 月次決算処理（パラメータ変動・イベント発生・称号判定・レポート生成）
  const closeResult = processMonthlyClose(ST.input_month);

  save();

  const totalXpGain = xpGain.sales + xpGain.install + xpGain.mainte + (closeResult ? closeResult.xpGain : 0);
  let toastMsg = '+' + totalXpGain + ' XP もらった！';
  if (closeResult && closeResult.badges.length > 0) {
    toastMsg += ' 🏆 ' + closeResult.badges[0].name + ' 獲得！';
  } else if (bondMessages.length > 0) {
    toastMsg += ' / ' + bondMessages[0];
  }
  showToast(toastMsg);

  if (levelUps.length > 0) {
    setTimeout(() => showLevelUp(levelUps[0]), 700);
  } else {
    setTimeout(() => goPage('home'), 1000);
  }
}

function generateQuestsFromData(md, month) {
  QUEST_TEMPLATES.forEach(qt => {
    const v = md[qt.triggerKpi];
    if (v === undefined || v === '') return;
    const dept = DEPTS[qt.dept];
    const item = dept.kgi.concat(dept.kpi.flatMap(c=>c.items)).find(i => i.id === qt.triggerKpi);
    if (!item) return;
    const pct = calcKpiPct(item, v);
    let triggered = false;
    if (qt.triggerCondition === 'low' && pct < 60) triggered = true;
    if (qt.triggerCondition === 'high' && pct < 50) triggered = true;
    if (!triggered) return;

    const existsKey = qt.id + '__' + month;
    if (ST.quests.find(q => q.key === existsKey)) return;
    ST.quests.push({
      key: existsKey,
      template_id: qt.id,
      dept: qt.dept,
      month: month,
      title: qt.title,
      trigger: qt.trigger,
      checks: qt.checks,
      who: '',
      what: '',
      due: '',
      status: 'open',
      created: month,
    });
  });
}

function showLevelUp(lu) {
  const overlay = document.getElementById('evo-overlay');
  const title = document.getElementById('evo-title');
  const svg = document.getElementById('evo-svg');
  const msg = document.getElementById('evo-msg');

  if (lu.type === 'hq') {
    title.textContent = '会社が発展した！';
    svg.setAttribute('viewBox','0 0 80 90');
    svg.innerHTML = makeHqSvg(lu.lv);
    msg.innerHTML = `アクアリンクが <b>Lv.${lu.lv}</b> に進化したよ！<br>会社がもっと立派になった`;
  } else {
    const dept = DEPTS[lu.type];
    title.textContent = dept.name + ' Lv.' + lu.lv + '！';
    svg.setAttribute('viewBox','0 0 60 80');
    svg.innerHTML = makeNpcSvg(lu.type, lu.lv);
    msg.innerHTML = `${dept.name}のメンバーが <b>Lv.${lu.lv}</b> に成長したよ`;
  }

  overlay.classList.add('show');
}

function closeEvo() {
  document.getElementById('evo-overlay').classList.remove('show');
  goPage('home');
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

let curHistTab = 'hq';
function switchHistTab(target) {
  curHistTab = target;
  document.querySelectorAll('.hist-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.target === target);
  });
  renderHistory();
}

function renderHistory() {
  const months = ST.history.slice().sort();
  const list = document.getElementById('hist-list');
  list.innerHTML = '';

  if (months.length === 0) {
    list.innerHTML = '<div class="empty-msg">まだ履歴がありません<br>月次入力を確定すると<br>ここに記録されます</div>';
    document.getElementById('hist-stat-1').textContent = '0';
    document.getElementById('hist-stat-2').textContent = '--';
    document.getElementById('hist-stat-3').textContent = '--';
    return;
  }

  let getKey, getColor, fmtFn;
  if (curHistTab === 'hq') {
    getKey = m => Number(getMonthData(m).hq_profit || 0);
    getColor = '#9CB088';
    fmtFn = v => v >= 1000000 ? '+' + (v/1000000).toFixed(1) + 'M' : Math.round(v/1000) + 'K';
  } else {
    const dept = DEPTS[curHistTab];
    getKey = m => Number(getMonthData(m)[dept.kgi[0].id] || 0);
    getColor = dept.color;
    fmtFn = v => {
      const k = dept.kgi[0];
      if (k.fmt === 'currency') return v >= 1000000 ? (v/1000000).toFixed(1) + 'M' : Math.round(v/1000) + 'K';
      if (k.fmt === 'pct') return v.toFixed(1) + '%';
      return Math.round(v).toLocaleString();
    };
  }

  const values = months.map(m => ({m, v: getKey(m)}));
  const max = Math.max(...values.map(x => x.v), 1);
  const recent = values.slice(-3);
  const avgRecent = recent.reduce((s,x)=>s+x.v,0) / Math.max(recent.length,1);

  document.getElementById('hist-stat-1').textContent = months.length;
  document.getElementById('hist-stat-2').textContent = fmtFn(max);
  document.getElementById('hist-stat-3').textContent = fmtFn(avgRecent);

  values.forEach(({m,v}) => {
    const pct = max > 0 ? Math.round(v/max * 100) : 0;
    list.innerHTML += `
      <div class="hist-row">
        <span class="hist-row-month">${fmtMonth(m)}</span>
        <div class="hist-row-bar"><div class="hist-row-seg" style="width:${pct}%;background:${getColor};"></div></div>
        <span class="hist-row-num">${fmtFn(v)}</span>
      </div>
    `;
  });
}

function goPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  document.querySelectorAll('.bnav-btn').forEach(b => b.classList.remove('active'));
  const navMap = {home:'bnav-home', input:'bnav-input', quest:'bnav-quest', history:'bnav-history', dept:'bnav-home', report:'bnav-home'};
  const navId = navMap[page];
  if (navId) document.getElementById(navId).classList.add('active');

  if (page === 'home') renderHome();
  if (page === 'dept') renderDept();
  if (page === 'input') renderInput();
  if (page === 'history') renderHistory();
  if (page === 'quest') renderQuest();
  if (page === 'report') renderReport();
}

let curQuestTab = 'active';
function switchQuestTab(tab) {
  curQuestTab = tab;
  document.querySelectorAll('.quest-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('qtab-' + tab).classList.add('active');
  renderQuest();
}

function renderQuest() {
  const activeQuests = ST.quests.filter(q => q.status === 'open');
  const reviewQuests = ST.quests.filter(q => q.status === 'review_pending');
  const doneQuests = ST.quests.filter(q => q.status === 'done');

  document.getElementById('qtab-active-count').textContent = activeQuests.length;
  document.getElementById('qtab-review-count').textContent = reviewQuests.length;

  const content = document.getElementById('quest-content');
  content.innerHTML = '';

  if (curQuestTab === 'active') {
    if (activeQuests.length === 0) {
      content.innerHTML = '<div class="empty-msg">進行中のクエストはありません<br>月次決算を確定すると<br>未達項目から自動でクエストが生まれます</div>';
    } else {
      activeQuests.forEach(q => content.appendChild(makeQuestCard(q, 'active')));
    }
  } else if (curQuestTab === 'review') {
    if (reviewQuests.length === 0) {
      content.innerHTML = '<div class="empty-msg">翌月確認待ちのクエストはありません<br>クエストを完了して<br>翌月の月次決算を入力すると<br>ここに表示されます</div>';
    } else {
      reviewQuests.forEach(q => content.appendChild(makeQuestCard(q, 'review')));
    }
  } else if (curQuestTab === 'bond') {
    renderBonds(content);
  } else if (curQuestTab === 'done') {
    if (doneQuests.length === 0) {
      content.innerHTML = '<div class="empty-msg">達成済クエストはまだありません</div>';
    } else {
      doneQuests.slice().reverse().forEach(q => content.appendChild(makeQuestCard(q, 'done')));
    }
  }
}

function makeQuestCard(q, mode) {
  const card = document.createElement('div');
  const dept = DEPTS[q.dept];
  let cls = 'quest-card';
  if (mode === 'review') cls += ' review';
  else if (mode === 'done') cls += ' done';
  else cls += ' bad';
  card.className = cls;

  const checkList = q.checks.map(c => '<li>'+c+'</li>').join('');
  let formHtml = '';
  let actionsHtml = '';

  if (mode === 'active') {
    formHtml = `
      <div class="quest-form">
        <div class="quest-form-row">
          <span class="quest-form-lbl">改善内容</span>
          <input class="quest-form-input" data-qkey="${q.key}" data-field="what" value="${q.what||''}" placeholder="何をやるか">
        </div>
        <div class="quest-form-row">
          <span class="quest-form-lbl">担当者</span>
          <input class="quest-form-input" data-qkey="${q.key}" data-field="who" value="${q.who||''}" placeholder="誰がやるか">
        </div>
        <div class="quest-form-row">
          <span class="quest-form-lbl">期限</span>
          <input class="quest-form-input" data-qkey="${q.key}" data-field="due" value="${q.due||''}" placeholder="いつまでに">
        </div>
      </div>
      <div class="quest-form-buttons">
        <button class="q-btn alt" onclick="closeQuest('${q.key}')"><i class="ti ti-x"></i>閉じる</button>
        <button class="q-btn" onclick="moveToReview('${q.key}')"><i class="ti ti-check"></i>翌月確認に送る</button>
      </div>
    `;
  } else if (mode === 'review') {
    formHtml = `
      <div class="quest-checks">
        <div class="quest-checks-h">改善内容</div>
        <div class="quest-checks-list" style="font-size:11px;">
          ${q.what ? '・' + q.what + '<br>' : ''}
          ${q.who ? '担当：' + q.who + '<br>' : ''}
          ${q.due ? '期限：' + q.due : ''}
        </div>
      </div>
      <div class="quest-form-buttons">
        <button class="q-btn danger" onclick="reviewQuest('${q.key}', false)"><i class="ti ti-x"></i>改善できなかった</button>
        <button class="q-btn success" onclick="reviewQuest('${q.key}', true)"><i class="ti ti-trophy"></i>改善した！+100XP</button>
      </div>
    `;
  } else if (mode === 'done') {
    actionsHtml = `<span class="quest-status-tag done">達成 (${q.completed_month||q.month})</span>`;
  }

  card.innerHTML = `
    <div class="quest-head">
      <div class="quest-head-icon"><i class="ti ti-${mode==='done'?'trophy':mode==='review'?'eye':'flag'}"></i></div>
      <div class="quest-title">${dept.name} / ${q.title}${actionsHtml}</div>
      <div class="quest-xp">+50〜100 XP</div>
    </div>
    <div class="quest-trigger">📌 ${q.trigger}（${fmtMonth(q.month)}）</div>
    ${mode!=='done' ? `<div class="quest-checks">
      <div class="quest-checks-h">確認すること</div>
      <ul class="quest-checks-list">${checkList}</ul>
    </div>`:''}
    ${formHtml}
  `;

  setTimeout(() => {
    card.querySelectorAll('.quest-form-input').forEach(inp => {
      inp.addEventListener('change', () => {
        const qkey = inp.dataset.qkey;
        const field = inp.dataset.field;
        const quest = ST.quests.find(q => q.key === qkey);
        if (quest) { quest[field] = inp.value; save(); }
      });
    });
  }, 0);

  return card;
}

function closeQuest(key) {
  const q = ST.quests.find(x => x.key === key);
  if (!q) return;
  if (!confirm('このクエストを閉じますか？')) return;
  ST.quests = ST.quests.filter(x => x.key !== key);
  save();
  renderQuest();
}

function moveToReview(key) {
  const q = ST.quests.find(x => x.key === key);
  if (!q) return;
  if (!q.what || !q.who || !q.due) {
    showToast('改善内容・担当・期限を入れてください');
    return;
  }
  q.status = 'review_pending';
  let bonus = 30 + 50 + 30;
  ST.xp[q.dept] += bonus;
  save();
  showToast('+' + bonus + ' XP / 翌月確認へ');
  renderQuest();
}

function reviewQuest(key, success) {
  const q = ST.quests.find(x => x.key === key);
  if (!q) return;
  q.status = 'done';
  q.completed_month = ST.current_month;
  q.success = success;
  if (success) {
    ST.xp[q.dept] += 150;
    showToast('+150 XP / 改善達成！');
    if (!ST.badges.find(b => b.id === 'quest_master_' + q.dept) && ST.quests.filter(x => x.dept === q.dept && x.status === 'done' && x.success).length >= 3) {
      ST.badges.push({id:'quest_master_'+q.dept, name:DEPTS[q.dept].name+' 改善マスター', dept:q.dept, month:ST.current_month});
    }
  } else {
    ST.xp[q.dept] += 30;
    showToast('+30 XP / 次回がんばろう');
  }
  save();
  renderQuest();
}

function renderBonds(content) {
  const md = getMonthData(ST.current_month);
  if (!md || Object.keys(md).length === 0) {
    content.innerHTML = '<div class="empty-msg">今月の月次決算を確定すると<br>連携ボーナスの達成度が見えます</div>';
    return;
  }
  BONDS.forEach(bond => {
    const card = document.createElement('div');
    const totalMet = bond.levels.filter(lv => lv.check(md)).length;
    const allMet = totalMet === bond.levels.length;
    card.className = 'bond-bonus' + (allMet ? ' unlocked' : '');

    const condsHtml = bond.levels.map(lv => {
      const met = lv.check(md);
      return `<div class="bond-cond ${met?'met':''}">
        <span class="bond-cond-icon">${met?'✓':'·'}</span>
        <span>${lv.name} (+${lv.xp})</span>
      </div>`;
    }).join('');

    const totalXp = bond.levels.reduce((s,lv)=>s+lv.xp,0);
    card.innerHTML = `
      <div class="bond-head">
        <div class="bond-icons">
          <div class="bond-icon-circle" style="background:${bond.color1};">${bond.icon1}</div>
          <div class="bond-icon-circle" style="background:${bond.color2};">${bond.icon2}</div>
        </div>
        <div class="bond-name">${bond.name}</div>
        <div class="bond-xp">最大+${totalXp}</div>
      </div>
      <div class="bond-conds">${condsHtml}</div>
      ${allMet ? `<div class="bond-title-claim">${bond.title}</div>` : ''}
    `;
    content.appendChild(card);
  });
}

ST.current_month = ST.current_month || getCurrentMonth();
ST.input_month = ST.input_month || ST.current_month;
renderHome();

</script>
