<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="アクアリンク経営発展記">
<meta name="theme-color" content="#7c5538">
<title>アクアリンク経営発展記</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=M+PLUS+Rounded+1c:wght@500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#f5e3b8;
  --paper-d:#e6cf95;
  --paper-vd:#d4b876;
  --wood-l:#a47a48;
  --wood:#8b5a2b;
  --wood-d:#6e4421;
  --wood-vd:#3d2510;
  --metal:#7a8898;
  --metal-l:#b8c2cc;
  --metal-d:#48535f;
  --stone:#5d6975;
  --stone-d:#3d4855;
  --gold:#fdc956;
  --gold-d:#e89324;
  --gold-vd:#a06f10;
  --green:#3aa050;
  --green-l:#86e08c;
  --blue:#3b82c4;
  --blue-l:#7eb8e4;
  --red:#d24545;
  --red-l:#f08080;
  --orange:#e8842a;
  --orange-l:#f5b76e;
  --purple:#6c5ce7;
  --ink:#3a2410;
  --ink-soft:#5e3a17;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{
  height:100%;overflow:hidden;
  font-family:'M PLUS Rounded 1c',sans-serif;
  color:var(--ink);
  background:#202830;
  -webkit-user-select:none;user-select:none;
  -webkit-text-size-adjust:100%;
}
button{font-family:inherit;color:inherit;cursor:pointer;}
input{font-family:inherit;}

/* ── ROOT FRAME ── */
.app{
  position:relative;
  width:100%;height:100%;
  max-width:480px;margin:0 auto;
  display:flex;flex-direction:column;
  background:linear-gradient(180deg,#88ceee 0%,#aedef4 30%,#7c9cb8 50%,#586978 70%,#4a5460 100%);
  overflow:hidden;
  box-shadow:0 0 30px rgba(0,0,0,.3);
}

/* ════════════════════════════════
   タイトルバー（羊皮紙バナー）
═══════════════════════════════ */
.title-bar{
  display:flex;align-items:center;
  padding:6px 6px 5px;gap:5px;
  flex-shrink:0;
  background:linear-gradient(180deg,#88ceee 0%,#a8d8ee 100%);
  z-index:10;
}
.banner{
  flex:1;
  position:relative;
  background:linear-gradient(180deg,#f7e9c0 0%,#e8d09b 100%);
  border:2px solid var(--ink);
  border-radius:5px;
  padding:6px 10px 6px 30px;
  box-shadow:0 2px 0 rgba(0,0,0,.25),inset 0 1px 0 rgba(255,255,255,.5);
  font-size:14px;font-weight:900;
  color:var(--ink);
  letter-spacing:.02em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.banner::before,.banner::after{
  content:'';position:absolute;
  top:50%;width:6px;height:18px;
  background:linear-gradient(180deg,#a47a48,#7d4f24);
  border:1.5px solid var(--ink);
  transform:translateY(-50%);
}
.banner::before{left:-4px;border-radius:2px 0 0 2px;}
.banner::after{right:-4px;border-radius:0 2px 2px 0;}
.banner-icon{
  position:absolute;left:6px;top:50%;transform:translateY(-50%);
  width:20px;height:20px;
  background:linear-gradient(180deg,#b9c4ce 0%,#7e8a96 100%);
  border:1.5px solid var(--ink);border-radius:3px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:inset 1px 1px 0 rgba(255,255,255,.4),inset -1px -1px 0 rgba(0,0,0,.3);
}
.banner-icon::before{
  content:'';
  width:12px;height:12px;
  background:
    linear-gradient(rgba(255,255,255,.7),rgba(255,255,255,.7)) 0px 0px/2px 2px no-repeat,
    linear-gradient(rgba(255,255,255,.7),rgba(255,255,255,.7)) 4px 0px/2px 2px no-repeat,
    linear-gradient(rgba(255,255,255,.7),rgba(255,255,255,.7)) 8px 0px/2px 2px no-repeat,
    linear-gradient(rgba(255,255,255,.7),rgba(255,255,255,.7)) 0px 4px/2px 2px no-repeat,
    linear-gradient(#5b3f1a,#5b3f1a) 4px 4px/2px 4px no-repeat,
    linear-gradient(rgba(255,255,255,.7),rgba(255,255,255,.7)) 8px 4px/2px 2px no-repeat;
}
.chip{
  position:relative;
  background:linear-gradient(180deg,#a47a48 0%,#7d4f24 100%);
  border:2px solid var(--ink);
  border-radius:5px;
  padding:5px 8px;
  font-family:'DotGothic16',monospace;
  font-size:11px;font-weight:700;color:#fff7d0;
  text-shadow:0 1px 0 rgba(0,0,0,.5);
  box-shadow:0 2px 0 rgba(0,0,0,.25),inset 0 1px 0 rgba(255,255,255,.25);
  white-space:nowrap;
}
.chip.coin{display:flex;align-items:center;gap:4px;}
.chip.coin::before{
  content:'';width:13px;height:13px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#ffe25a,#c98a10 70%);
  border:1.5px solid #5e3a17;flex-shrink:0;
}

/* ════════════════════════════════
   ステージ（ビル+キャラ画像）
═══════════════════════════════ */
.stage{
  position:relative;
  flex-shrink:0;
  width:100%;
  background:linear-gradient(180deg,#88ceee 0%,#aedef4 100%);
  overflow:hidden;
}
.stage-img{
  display:block;
  width:100%;height:auto;
  user-select:none;-webkit-user-drag:none;
}
.rank-tag{
  position:absolute;top:4px;left:50%;transform:translateX(-50%);
  background:linear-gradient(180deg,#a47a48,#7d4f24);
  border:2px solid var(--ink);border-radius:5px;
  padding:3px 12px 3px 26px;
  font-size:11px;font-weight:700;color:#fff7d0;
  text-shadow:1px 1px 0 rgba(0,0,0,.5);
  box-shadow:0 2px 0 rgba(0,0,0,.3),0 0 0 2px rgba(255,255,255,.15);
  white-space:nowrap;z-index:5;
  letter-spacing:.02em;
}
.rank-tag::before{
  content:'';position:absolute;left:6px;top:50%;transform:translateY(-50%);
  width:14px;height:14px;
  background:#f5e3b8;border:1.5px solid var(--ink);border-radius:2px;
  box-shadow:inset 1px 1px 0 rgba(255,255,255,.5);
}

/* ════════════════════════════════
   部門ラベル＋楕円ベース（HTML側で描画）
═══════════════════════════════ */
.dept-row{
  display:flex;justify-content:space-around;
  background:linear-gradient(180deg,#7ec172 0%,#5fa157 100%);
  padding:4px 6px 8px;
  position:relative;
  flex-shrink:0;
  /* 草地パターン */
  background-image:
    radial-gradient(ellipse at 10% 20%,rgba(255,255,255,.15),transparent 6px),
    radial-gradient(ellipse at 30% 60%,rgba(255,255,255,.1),transparent 5px),
    radial-gradient(ellipse at 70% 30%,rgba(255,255,255,.12),transparent 5px),
    radial-gradient(ellipse at 90% 70%,rgba(255,255,255,.1),transparent 5px),
    linear-gradient(180deg,#7ec172 0%,#5fa157 100%);
}
.dept-pill{
  background:linear-gradient(180deg,#a47a48,#7d4f24);
  border:2px solid var(--ink);border-radius:5px;
  padding:3px 10px;
  font-size:11px;font-weight:700;color:#fff7d0;
  text-shadow:1px 1px 0 rgba(0,0,0,.5);
  box-shadow:0 2px 0 rgba(0,0,0,.3);
  white-space:nowrap;
  letter-spacing:.02em;
  cursor:pointer;
}
.dept-pill:active{transform:translateY(1px);box-shadow:0 1px 0 rgba(0,0,0,.3);}

/* ════════════════════════════════
   メインスクロール（KGIパネル等）
═══════════════════════════════ */
.scroll-area{
  flex:1;
  overflow-y:auto;
  background:
    repeating-linear-gradient(90deg,
      #5d6975 0px,#5d6975 80px,
      #4d5963 80px,#4d5963 81px,
      #5d6975 81px,#5d6975 160px),
    repeating-linear-gradient(0deg,
      #5d6975 0px,#5d6975 30px,
      #4d5963 30px,#4d5963 31px);
  padding:8px 8px 12px;
  position:relative;
  border-top:6px solid var(--wood-vd);
  box-shadow:inset 0 6px 0 #6e4421;
}
.scroll-area::-webkit-scrollbar{width:0;}

/* 木製パネル */
.wood-panel{
  position:relative;
  background:
    linear-gradient(180deg,rgba(0,0,0,.04),rgba(0,0,0,.18)),
    repeating-linear-gradient(90deg,
      #a06832 0px,#a06832 6px,
      #8e5722 6px,#8e5722 7px,
      #a06832 7px,#a06832 18px),
    #8e5722;
  border:3px solid var(--wood-vd);
  border-radius:8px;
  padding:10px 10px 8px;
  box-shadow:0 3px 0 rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.1);
  margin-bottom:8px;
}
.wood-panel::before,.wood-panel::after,
.wp-corners i:nth-child(1),.wp-corners i:nth-child(2){
  content:'';position:absolute;width:13px;height:13px;
  background:radial-gradient(circle at 35% 35%,#c8d2dc,#5d6c7c 70%);
  border:1.5px solid var(--ink);border-radius:50%;
  box-shadow:inset -1px -1px 0 rgba(0,0,0,.4);
}
.wood-panel::before{top:4px;left:4px;}
.wood-panel::after{top:4px;right:4px;}
.wp-corners{position:absolute;inset:0;pointer-events:none;}
.wp-corners i:nth-child(1){bottom:4px;left:4px;}
.wp-corners i:nth-child(2){bottom:4px;right:4px;}

.wp-title{
  display:flex;align-items:center;gap:6px;
  font-size:13px;font-weight:900;color:#fff7d0;
  text-shadow:1px 1px 0 rgba(0,0,0,.6);
  margin-bottom:8px;padding-left:2px;
}
.wp-title-icon{
  width:18px;height:18px;
  background:linear-gradient(180deg,#7a4d24,#5e3a17);
  border:1.5px solid var(--wood-vd);border-radius:3px;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;flex-shrink:0;
}

/* KGI項目（パピルス内） */
.kgi-row{
  position:relative;
  background:linear-gradient(180deg,#f4e3b6 0%,#e6cf95 100%);
  border:2px solid var(--ink);border-radius:5px;
  padding:7px 10px;margin-bottom:6px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.5),0 2px 0 rgba(0,0,0,.2);
}
.kgi-row:last-child{margin-bottom:0;}
.kgi-label{
  font-size:11px;font-weight:700;color:var(--ink);margin-bottom:4px;
}
.kgi-bar-wrap{display:flex;align-items:center;gap:6px;}
.kgi-coin{
  display:flex;align-items:center;gap:4px;
  font-size:10px;font-weight:700;color:var(--ink-soft);
  white-space:nowrap;flex-shrink:0;
  font-family:'DotGothic16',monospace;
}
.kgi-coin::before{
  content:'';width:11px;height:11px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#ffe25a,#c98a10 70%);
  border:1.5px solid #5e3a17;flex-shrink:0;
}
.kgi-bar{
  flex:1;height:14px;
  background:linear-gradient(180deg,#3a2410,#5e3a17);
  border:1.5px solid var(--ink);border-radius:3px;
  overflow:hidden;
  box-shadow:inset 0 1px 2px rgba(0,0,0,.5);
}
.kgi-fill{
  height:100%;
  background:linear-gradient(180deg,#ffd84a 0%,#f1a020 100%);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.5);
  transition:width .5s cubic-bezier(.4,0,.2,1);
}
.kgi-fill.green{background:linear-gradient(180deg,#86e08c,#3aa050);}
.kgi-fill.red{background:linear-gradient(180deg,#f08080,#c03030);}

/* 部門ステータスカード */
.dept-status-row{
  display:flex;gap:5px;
  background:linear-gradient(180deg,rgba(0,0,0,.4),rgba(0,0,0,.6));
  padding:5px;margin-bottom:8px;
  border-radius:6px;border:2px solid var(--ink);
}
.dsc{
  flex:1;
  background:linear-gradient(180deg,#f4e3b6,#e6cf95);
  border:1.5px solid var(--ink);border-radius:4px;
  padding:5px 4px;text-align:center;
  cursor:pointer;
}
.dsc:active{filter:brightness(.92);}
.dsc-name{font-size:10px;font-weight:900;color:var(--ink);}
.dsc-lvl{font-size:8px;color:var(--ink-soft);font-weight:700;line-height:1.2;margin-top:1px;}
.dsc-bar{
  height:4px;background:#3a2410;border-radius:2px;
  margin-top:3px;overflow:hidden;
}
.dsc-bar-fill{
  height:100%;
  background:linear-gradient(180deg,#86e08c,#3aa050);
  transition:width .5s;
}
.dsc.eigyo .dsc-bar-fill{background:linear-gradient(180deg,#7eb8e4,#3b82c4);}
.dsc.setchi .dsc-bar-fill{background:linear-gradient(180deg,#f5b76e,#e8842a);}
.dsc.mente .dsc-bar-fill{background:linear-gradient(180deg,#f08080,#d24545);}

/* 7ステータスグリッド */
.statgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.statgrid .sc{
  background:linear-gradient(180deg,#f4e3b6,#e6cf95);
  border:1.5px solid var(--ink);border-radius:4px;
  padding:4px 1px;text-align:center;
}
.sc-lbl{font-size:8px;font-weight:700;color:var(--ink-soft);line-height:1.3;}
.sc-val{
  font-family:'DotGothic16',monospace;
  font-size:13px;font-weight:700;color:var(--ink);margin-top:1px;
}

/* 巻物パネル */
.scroll-panel{
  position:relative;
  background:linear-gradient(180deg,#3a2410,#2d1c0c);
  border:3px solid var(--wood-vd);
  border-radius:8px;
  padding:8px;margin-bottom:8px;
  box-shadow:0 3px 0 rgba(0,0,0,.3);
}
.scroll-paper{
  position:relative;
  background:radial-gradient(ellipse at 50% 50%,#f7e9c4 0%,#e8d09b 75%,#d6b873 100%);
  border:2px solid var(--wood-vd);border-radius:5px;
  padding:14px 18px;
  min-height:80px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;
  font-size:11px;color:var(--ink);line-height:1.6;
  box-shadow:inset 0 0 12px rgba(155,124,74,.3),inset 0 1px 0 rgba(255,255,255,.4);
}
.scroll-paper::before,.scroll-paper::after{
  content:'';position:absolute;
  width:20px;height:calc(100% + 6px);
  background:linear-gradient(90deg,#7d4f24 0%,#a47a48 50%,#7d4f24 100%);
  border:2px solid var(--wood-vd);
  top:-3px;
}
.scroll-paper::before{left:-12px;border-radius:4px 0 0 4px;}
.scroll-paper::after{right:-12px;border-radius:0 4px 4px 0;}
.scroll-empty-icon{font-size:24px;line-height:1;margin-bottom:4px;}

/* クエスト項目（リスト） */
.q-list{display:flex;flex-direction:column;gap:5px;width:100%;}
.q-item{
  display:flex;align-items:flex-start;gap:8px;
  background:rgba(255,255,255,.45);
  border:1.5px solid var(--wood-vd);
  border-radius:4px;
  padding:6px 8px;
  text-align:left;
}
.q-item:active{filter:brightness(.92);}
.q-stars{
  font-size:9px;color:var(--gold-vd);font-weight:900;
  white-space:nowrap;flex-shrink:0;line-height:1.5;
}
.q-body{flex:1;min-width:0;}
.q-title{font-size:11px;font-weight:700;color:var(--ink);line-height:1.4;}
.q-meta{font-size:9px;color:var(--ink-soft);margin-top:2px;line-height:1.4;}
.q-tag{
  display:inline-block;
  font-size:8px;
  background:var(--blue);color:#fff;
  padding:1px 4px;border-radius:2px;margin-right:3px;
  font-weight:700;
}
.q-tag.eigyo{background:#3b82c4;}
.q-tag.setchi{background:#e8842a;}
.q-tag.mente{background:#d24545;}
.q-tag.zen{background:#6c5ce7;}
.q-xp{
  font-family:'DotGothic16',monospace;
  font-size:10px;color:var(--gold-vd);font-weight:700;flex-shrink:0;
  text-align:right;line-height:1.3;
}
.q-item.done{opacity:.55;}
.q-item.done .q-title{text-decoration:line-through;color:var(--ink-soft);}

/* ════════════════════════════════
   下部ナビ
═══════════════════════════════ */
.bottom-nav{
  display:flex;align-items:stretch;
  background:linear-gradient(180deg,#5e3a17,#3d2510);
  border-top:3px solid var(--wood-vd);
  padding:5px;gap:5px;flex-shrink:0;
}
.nav-btn{
  flex:1;position:relative;
  background:linear-gradient(180deg,#8aaad0,#5680b0);
  border:2px solid var(--ink);border-radius:5px;
  padding:6px 4px 4px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  font-size:11px;font-weight:900;color:#fff7d0;
  text-shadow:1px 1px 0 rgba(0,0,0,.5);
  box-shadow:0 2px 0 rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.3);
}
.nav-btn:active{transform:translateY(1px);box-shadow:0 1px 0 rgba(0,0,0,.4);}
.nav-btn.active{
  background:linear-gradient(180deg,#fdc956,#e89324);
  color:var(--ink);text-shadow:0 1px 0 rgba(255,255,255,.3);
}
.nav-icon{
  width:22px;height:22px;
  background:linear-gradient(180deg,rgba(0,0,0,.15),rgba(0,0,0,.35));
  border:1.5px solid var(--ink);border-radius:3px;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;
}
.nav-btn.active .nav-icon{background:linear-gradient(180deg,rgba(0,0,0,.1),rgba(0,0,0,.25));}

/* ════════════════════════════════
   PAGE切り替え
═══════════════════════════════ */
.page{display:none;flex:1;flex-direction:column;overflow:hidden;}
.page.active{display:flex;}

.page-scroll{
  flex:1;overflow-y:auto;
  padding:8px;
  background:
    repeating-linear-gradient(90deg,
      #5d6975 0px,#5d6975 80px,
      #4d5963 80px,#4d5963 81px),
    repeating-linear-gradient(0deg,
      #5d6975 0px,#5d6975 30px,
      #4d5963 30px,#4d5963 31px);
}
.page-scroll::-webkit-scrollbar{width:0;}

/* ════════════════════════════════
   入力ページ
═══════════════════════════════ */
.month-bar{
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(180deg,#a47a48,#7d4f24);
  border:2px solid var(--ink);border-radius:6px;
  padding:6px 8px;margin-bottom:8px;
  box-shadow:0 2px 0 rgba(0,0,0,.3);
}
.month-arrow{
  background:linear-gradient(180deg,#fdc956,#e89324);
  border:1.5px solid var(--ink);border-radius:4px;
  padding:3px 9px;font-size:13px;font-weight:900;color:var(--ink);
  text-shadow:0 1px 0 rgba(255,255,255,.3);
  min-width:30px;
}
.month-arrow:disabled{opacity:.4;}
.month-text{
  font-family:'DotGothic16',monospace;
  font-size:14px;font-weight:700;color:#fff7d0;
  text-shadow:1px 1px 0 rgba(0,0,0,.5);
}

.section-tab{
  display:flex;gap:4px;margin-bottom:8px;
  background:linear-gradient(180deg,rgba(0,0,0,.3),rgba(0,0,0,.5));
  padding:4px;border-radius:6px;border:2px solid var(--ink);
}
.section-tab button{
  flex:1;
  background:linear-gradient(180deg,#8aaad0,#5680b0);
  border:1.5px solid var(--ink);border-radius:4px;
  padding:5px 2px;
  font-size:10px;font-weight:900;color:#fff7d0;
  text-shadow:0 1px 0 rgba(0,0,0,.5);
}
.section-tab button.active{
  background:linear-gradient(180deg,#fdc956,#e89324);
  color:var(--ink);text-shadow:0 1px 0 rgba(255,255,255,.3);
}

.input-group{
  background:
    linear-gradient(180deg,rgba(0,0,0,.04),rgba(0,0,0,.18)),
    #8e5722;
  border:3px solid var(--wood-vd);border-radius:8px;
  padding:8px;margin-bottom:8px;
  box-shadow:0 3px 0 rgba(0,0,0,.3);
}
.input-group-title{
  display:flex;align-items:center;gap:5px;
  font-size:12px;font-weight:900;color:#fff7d0;
  text-shadow:1px 1px 0 rgba(0,0,0,.6);
  margin-bottom:6px;padding-left:2px;
}
.igt-icon{
  width:16px;height:16px;border-radius:3px;
  border:1.5px solid var(--wood-vd);
  display:flex;align-items:center;justify-content:center;
  font-size:9px;color:#fff;
}
.igt-icon.zen{background:#6c5ce7;}
.igt-icon.eigyo{background:#3b82c4;}
.igt-icon.setchi{background:#e8842a;}
.igt-icon.mente{background:#d24545;}

.input-row{
  display:flex;align-items:center;gap:5px;
  background:linear-gradient(180deg,#f4e3b6,#e6cf95);

}

  0%,100%{background:radial-gradient(circle,rgba(255,200,0,.4),rgba(0,0,0,.85));}

  0%{transform:scale(.4);opacity:0;}
  100%{transform:scale(1);opacity:1;}
}
.rankup-title{

/* ユーティリティ */
function fmtYm(y,m){return y+'.'+String(m).padStart(2,'0');}
function curYmStr(){return fmtYm(ST.ym.y,ST.ym.m);}
function findRank(xp){let r=COMPANY_RANKS[0];for(const c of COMPANY_RANKS){if(xp>=c.xp)r=c;}return r;}
function findDeptLvl(xp){let r=DEPT_LEVELS[0];for(const c of DEPT_LEVELS){if(xp>=c.xp)r=c;}return r;}
function nextRank(xp){for(const c of COMPANY_RANKS){if(xp<c.xp)return c;}return null;}
function nextDeptLvl(xp){for(const c of DEPT_LEVELS){if(xp<c.xp)return c;}return null;}

function judge(kpi,val){
  if(val==null||isNaN(val))return null;
  let pct;
  if(kpi.reverse){
    const base=kpi.base!=null?kpi.base:kpi.t+10;
    if(val<=kpi.t)pct=100;
    else if(val>=base)pct=0;
    else pct=Math.round((1-(val-kpi.t)/(base-kpi.t))*100);
  }else{
    pct=Math.round(val/kpi.t*100);
  }
  pct=Math.max(0,Math.min(200,pct));
  let g;
  if(pct>=100)g='S';
  else if(pct>=80)g='A';
  else if(pct>=60)g='B';
  else if(pct>=40)g='C';
  else g='D';
  return {pct,g};
}

let toastTimer;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),1800);
}

function renderInputArea(){

    <div class="input-group-title"><span class="igt-icon ${sec}">${SECTION_ICON[sec]}</span>${SECTION_NAMES[sec]}のKPI/KGI</div>`;

    const tgt=kpi.reverse?`${kpi.t}${kpi.u}以下`:`目標 ${kpi.t}${kpi.u}`;
    html+=`<div class="input-row">
      <div class="input-info">
        <div class="input-label">${kpi.kgi?'<span class="star">⭐</span> ':''}${kpi.name}</div>
        <div class="input-target">${tgt}</div>
      </div>
      <input class="input-field" type="number" inputmode="decimal" data-kpi="${kpi.id}" value="${val!=null?val:''}" placeholder="0">
      <div class="input-unit">${kpi.u}</div>
      <div class="input-judge ${j?'j-'+j.g:''}">${j?j.g:'-'}</div>
    </div>`;
  });
  html+='</div>';

  const allIds=Object.values(KPI).flatMap(arr=>arr.map(k=>k.id));
  const done=allIds.filter(id=>ST.pendingValues[id]!=null).length;
  html+=`<div class="input-progress">入力進捗 ${done} / ${allIds.length}</div>`;

  ia.innerHTML=html;
  ia.querySelectorAll('.input-field').forEach(inp=>{
    inp.addEventListener('input',e=>{
      const id=e.target.dataset.kpi;
      const v=e.target.value;
      if(v===''||isNaN(parseFloat(v))){delete ST.pendingValues[id];}
      else{ST.pendingValues[id]=parseFloat(v);}
      const kpi=KPI[curSection].find(k=>k.id===id);
      const j=ST.pendingValues[id]!=null?judge(kpi,ST.pendingValues[id]):null;
      const judgeEl=e.target.parentElement.querySelector('.input-judge');
      judgeEl.className='input-judge '+(j?'j-'+j.g:'');
      judgeEl.textContent=j?j.g:'-';
      // 進捗更新
      const allIds2=Object.values(KPI).flatMap(arr=>arr.map(k=>k.id));
      const done2=allIds2.filter(id2=>ST.pendingValues[id2]!=null).length;
      const prog=ia.querySelector('.input-progress');
      if(prog)prog.textContent=`入力進捗 ${done2} / ${allIds2.length}`;
    });
  });
}

function confirmMonth(){
  const allIds=Object.values(KPI).flatMap(arr=>arr.map(k=>k.id));
  const filled=allIds.filter(id=>ST.pendingValues[id]!=null);
  if(filled.length===0){
    showToast('1つ以上のKPIを入力してください');
    return;
  }

  const ymStr=curYmStr();
  const idx=ST.history.findIndex(h=>h.ym===ymStr);

  let gainedXp=0;
  let gainedDeptXp={eigyo:0,setchi:0,mente:0};
  const judgeMap={};
  const kgiMap={};
  let deptKgisAchieved=0;

  // 入力XP
  filled.forEach(id=>{
    gainedXp+=5;
    const sec=Object.entries(KPI).find(([s,arr])=>arr.some(k=>k.id===id))[0];
    if(sec!=='zen')gainedDeptXp[sec]+=5;
  });

  // 部門全入力ボーナス
  ['eigyo','setchi','mente'].forEach(sec=>{
    const ids=KPI[sec].map(k=>k.id);
    if(ids.every(id=>ST.pendingValues[id]!=null)){
      gainedXp+=50;gainedDeptXp[sec]+=50;
    }
  });
  if(KPI.zen.every(k=>ST.pendingValues[k.id]!=null))gainedXp+=100;
  if(allIds.every(id=>ST.pendingValues[id]!=null))gainedXp+=200;

  // 達成判定
  Object.entries(KPI).forEach(([sec,arr])=>{
    arr.forEach(kpi=>{
      const v=ST.pendingValues[kpi.id];
      if(v==null)return;
      const j=judge(kpi,v);
      judgeMap[kpi.id]=j.g;
      if(kpi.kgi)kgiMap[kpi.id]=j.g;
      if(j.g==='S'||j.g==='A')gainedXp+=30;
      if(kpi.kgi&&j.g==='S'){
        gainedXp+=sec==='zen'?500:150;
        if(sec!=='zen')gainedDeptXp[sec]+=150;
      }
    });
  });

  ['eigyo','setchi','mente'].forEach(sec=>{
    const kgis=KPI[sec].filter(k=>k.kgi);
    if(kgis.length>0&&kgis.every(k=>kgiMap[k.id]==='S')){
      gainedXp+=300;gainedDeptXp[sec]+=300;
      deptKgisAchieved++;
    }
  });
  if(KPI.zen.filter(k=>k.kgi).every(k=>kgiMap[k.id]==='S'))gainedXp+=1000;
  if(deptKgisAchieved===3)gainedXp+=1500;

  const histEntry={
    ym:ymStr,
    values:{...ST.pendingValues},
    judges:judgeMap,
    kgis:kgiMap,
    rank:ST.rank,
    xpGained:gainedXp,
    deptKgisAchieved,
  };
  if(idx>=0){
    const old=ST.history[idx];
    ST.xp-=(old.xpGained||0);
    ST.history[idx]=histEntry;
  }else{
    ST.history.push(histEntry);
  }

  ST.xp+=gainedXp;
  ST.deptXp.eigyo+=gainedDeptXp.eigyo;
  ST.deptXp.setchi+=gainedDeptXp.setchi;
  ST.deptXp.mente+=gainedDeptXp.mente;

  updateCompanyStatus(ST.pendingValues,judgeMap);
  generateQuestsFromMonth(ST.pendingValues,judgeMap);

  // 称号更新
  TITLES_DEF.forEach(t=>{
    if(!ST.unlockedTitles.includes(t.id)&&t.cond(ST)){
      ST.unlockedTitles.push(t.id);
      setTimeout(()=>showToast('🏆 称号獲得：'+t.name),300);
    }
  });

  // ランクアップチェック
  const oldRank=ST.rank;
  const newRank=findRank(ST.xp);
  ST.rank=newRank.r;
  const rankUp=newRank.r>oldRank;

  // 月を進める
  ST.ym.m+=1;
  if(ST.ym.m>12){ST.ym.m=1;ST.ym.y+=1;}
  ST.pendingValues={};

  saveState();

  if(rankUp){
    document.getElementById('rankup-rank-text').textContent='Rank '+newRank.r+' '+newRank.name;
    document.getElementById('rankup-desc-text').textContent=newRank.desc;
    document.getElementById('rankup-mask').classList.add('show');
  }else{
    showToast('+'+gainedXp.toLocaleString()+' XP 獲得！');
  }

  renderTop();
  switchPage('home');
}

function updateCompanyStatus(values,judges){
  const s=ST.status;
  const j=g=>g==='S'?2:g==='A'?1:g==='B'?0:g==='C'?-1:g==='D'?-2:0;
  const clip=v=>Math.max(0,Math.min(100,v));
  s.uriage=clip((s.uriage||0)+j(judges.e_uriage)+j(judges.e_seiyaku));
  s.rieki=clip((s.rieki||0)+j(judges.z_profit)+j(judges.e_arari)+j(judges.m_shire)+j(judges.m_shohin));
  s.hinshitsu=clip((s.hinshitsu||0)+j(judges.z_claim)+j(judges.s_clm30)+j(judges.m_hinkai));
  s.genba=clip((s.genba||0)+j(judges.s_nouki)+j(judges.s_kanryo)+j(judges.s_sashin));
  s.kaishu=clip((s.kaishu||0)+j(judges.e_kaishu)+j(judges.z_unpaid)+j(judges.m_minou));
  s.renkei=clip((s.renkei||0)+j(judges.z_ikkei)+j(judges.e_clm3));
  s.kangen=clip((s.kangen||0)+j(judges.z_bonus)+j(judges.z_profit));
}

function generateQuestsFromMonth(values,judges){
  Object.entries(KPI).forEach(([sec,arr])=>{
    arr.forEach(kpi=>{
      const g=judges[kpi.id];
      if(!g)return;
      if(g==='C'||g==='D'){
        const tpl=QUEST_TPL[kpi.id];
        if(!tpl)return;
        const existing=ST.quests.find(q=>q.kpiId===kpi.id&&!q.done);
        if(existing){
          existing.stars=Math.min(5,existing.stars+1);
        }else{
          ST.quests.push({
            id:'q_'+Date.now()+'_'+Math.random().toString(36).slice(2,6),
            kpiId:kpi.id,
            title:tpl.title,
            action:tpl.action,
            deptTag:tpl.dept,
            stars:g==='D'?3:2,
            xp:g==='D'?200:100,
            done:false,
          });
        }
      }
    });
  });
}

function toggleQuest(qid){
  const q=ST.quests.find(x=>x.id===qid);
  if(!q)return;
  if(q.done){
    q.done=false;
    ST.xp=Math.max(0,ST.xp-q.xp);
    ST.questsCleared=Math.max(0,ST.questsCleared-1);
  }else{
    q.done=true;
    ST.xp+=q.xp;
    ST.questsCleared++;
    showToast('クエスト達成！+'+q.xp+' XP');
    const newRank=findRank(ST.xp);
    if(newRank.r>ST.rank){
      ST.rank=newRank.r;
      document.getElementById('rankup-rank-text').textContent='Rank '+newRank.r+' '+newRank.name;
      document.getElementById('rankup-desc-text').textContent=newRank.desc;
      document.getElementById('rankup-mask').classList.add('show');
    }
  }
  saveState();
  renderTop();
  if(document.getElementById('page-quest').classList.contains('active'))renderQuestPage();
}

  let html=`<div class="month-bar" style="display:block;text-align:center;">
    <div class="month-text">改善クエスト</div>
    <div style="font-size:10px;color:#fff7d0;margin-top:3px;text-shadow:1px 1px 0 rgba(0,0,0,.5);">
      未完了 ${open.length}件 / 完了 ${done.length}件
    </div>
  </div>`;

  if(ST.quests.length===0){
    html+=`<div class="wood-panel"><div class="wp-corners"><i></i><i></i></div>
      <div class="empty-msg">
        <span class="em-icon">🌱</span>
        まだクエストはありません<br>月次決算を入力すると<br>未達KPIから改善クエストが自動発生します
      </div>
    </div>`;
  }else{
    if(open.length>0){
      html+='<div class="wood-panel"><div class="wp-corners"><i></i><i></i></div>';
      html+='<div class="wp-title"><span class="wp-title-icon">⚒️</span>未完了クエスト</div>';
      html+='<div class="q-list">';
      open.forEach(q=>{
        html+=`<div class="q-item" data-qid="${q.id}">
          <div class="q-stars">${'★'.repeat(q.stars)}</div>
          <div class="q-body">
            <div class="q-title">${q.title}</div>
            <div class="q-meta"><span class="q-tag ${q.deptTag}">${SECTION_NAMES[q.deptTag]}</span>${q.action}</div>
          </div>
          <div class="q-xp">+${q.xp}<br>XP</div>
        </div>`;
      });
      html+='</div></div>';
    }
    if(done.length>0){
      html+='<div class="wood-panel"><div class="wp-corners"><i></i><i></i></div>';
      html+='<div class="wp-title"><span class="wp-title-icon">✅</span>完了クエスト</div>';
      html+='<div class="q-list">';
      done.forEach(q=>{
        html+=`<div class="q-item done" data-qid="${q.id}">
          <div class="q-stars">${'★'.repeat(q.stars)}</div>
          <div class="q-body">
            <div class="q-title">${q.title}</div>
            <div class="q-meta"><span class="q-tag ${q.deptTag}">${SECTION_NAMES[q.deptTag]}</span>${q.action}</div>
          </div>
          <div class="q-xp">+${q.xp}<br>XP</div>
        </div>`;
      });
      html+='</div></div>';
    }
  }
  el.innerHTML=html;
  el.querySelectorAll('.q-item').forEach(it=>{
    it.addEventListener('click',()=>toggleQuest(it.dataset.qid));
  });
}

/* ════════════════════════════════════════════
   履歴ページ
═════════════════════════════════════════════ */
function renderHistoryPage(){
  const el=document.getElementById('history-scroll');
  let html=`<div class="month-bar" style="display:block;text-align:center;">
    <div class="month-text">経営履歴</div>
    <div style="font-size:10px;color:#fff7d0;margin-top:3px;text-shadow:1px 1px 0 rgba(0,0,0,.5);">
      入力月数 ${ST.history.length}ヶ月 ／ 称号 ${ST.unlockedTitles.length}/${TITLES_DEF.length}
    </div>
  </div>`;

  // 称号
  html+='<div class="wood-panel"><div class="wp-corners"><i></i><i></i></div>';
  html+='<div class="wp-title"><span class="wp-title-icon">🏆</span>獲得称号</div>';
  html+='<div class="title-list">';
  TITLES_DEF.forEach(t=>{
    const u=ST.unlockedTitles.includes(t.id);
    html+=`<span class="title-pill ${u?'':'locked'}">${u?'🏆':'🔒'} ${t.name}</span>`;
  });
  html+='</div></div>';

  if(ST.history.length===0){
    html+=`<div class="wood-panel"><div class="wp-corners"><i></i><i></i></div>
      <div class="empty-msg"><span class="em-icon">📜</span>まだ履歴がありません</div>
    </div>`;
  }else{
    html+='<div class="wood-panel"><div class="wp-corners"><i></i><i></i></div>';
    html+='<div class="wp-title"><span class="wp-title-icon">📅</span>月次レポート</div>';
    [...ST.history].reverse().forEach(h=>{
      const sCount=Object.values(h.judges||{}).filter(g=>g==='S').length;
      const aCount=Object.values(h.judges||{}).filter(g=>g==='A').length;
      const bCount=Object.values(h.judges||{}).filter(g=>g==='B').length;
      const cCount=Object.values(h.judges||{}).filter(g=>g==='C').length;
      const dCount=Object.values(h.judges||{}).filter(g=>g==='D').length;
      const ranko=COMPANY_RANKS.find(r=>r.r===h.rank);
      html+=`<div class="history-month" data-ym="${h.ym}">
        <div class="hm-head">
          <div class="hm-month">${h.ym}</div>
          <div class="hm-rank-badge">Rank ${h.rank} ${ranko.name}</div>
        </div>
        <div class="hm-summary">
          <span class="hm-mark j-S">${sCount}</span>
          <span class="hm-mark j-A">${aCount}</span>
          <span class="hm-mark j-B">${bCount}</span>
          <span class="hm-mark j-C">${cCount}</span>
          <span class="hm-mark j-D">${dCount}</span>
          <span class="hm-xp">+${(h.xpGained||0).toLocaleString()} XP</span>
        </div>
      </div>`;
    });
    html+='</div>';
  }

  html+=`<button class="reset-btn" id="btn-reset">⚠️ データを全リセット</button>`;
  el.innerHTML=html;
  el.querySelectorAll('.history-month').forEach(it=>{
    it.addEventListener('click',()=>showHistoryDetail(it.dataset.ym));
  });
  const rb=document.getElementById('btn-reset');
  if(rb){
    rb.addEventListener('click',()=>{
      if(confirm('すべてのデータをリセットしますか？\nこの操作は取り消せません。')){
        localStorage.removeItem('aqualink_v2');
        location.reload();
      }
    });
  }
}

function showHistoryDetail(ym){
  const h=ST.history.find(x=>x.ym===ym);
  if(!h)return;
  document.getElementById('modal-title').textContent=ym+' 月次レポート';
  let html='';
  Object.entries(KPI).forEach(([sec,arr])=>{
    const inputed=arr.filter(k=>h.values[k.id]!=null);
    if(inputed.length===0)return;
    html+=`<div class="dept-detail-head">
      <div class="ddh-icon ${sec}">${SECTION_ICON[sec]}</div>
      <div><div class="ddh-name">${SECTION_NAMES[sec]}</div></div>
    </div>`;
    inputed.forEach(kpi=>{
      const v=h.values[kpi.id];
      const g=h.judges[kpi.id];
      html+=`<div class="kpi-mini">
        <span class="kpi-mini-name">${kpi.kgi?'⭐':''} ${kpi.name}</span>
        <span class="kpi-mini-val">${v}${kpi.u}</span>
        <span class="kpi-mini-judge j-${g}">${g}</span>
      </div>`;
    });
  });
  html+=`<div style="margin-top:12px;padding:8px 10px;background:linear-gradient(180deg,#fdc956,#e89324);border:2px solid var(--ink);border-radius:6px;text-align:center;">
    <span style="font-family:'DotGothic16',monospace;font-size:14px;font-weight:700;color:var(--ink);text-shadow:0 1px 0 rgba(255,255,255,.3);">獲得XP +${(h.xpGained||0).toLocaleString()}</span>
  </div>`;
  document.getElementById('modal-body').innerHTML=html;
  document.getElementById('modal').classList.add('show');
}

/* ════════════════════════════════════════════
   部門詳細モーダル
═════════════════════════════════════════════ */
function showDeptDetail(dept){
  const lvl=findDeptLvl(ST.deptXp[dept]||0);
  const next=nextDeptLvl(ST.deptXp[dept]||0);
  document.getElementById('modal-title').textContent=SECTION_NAMES[dept]+' 詳細';
  let html=`<div class="dept-detail-head">
    <div class="ddh-icon ${dept}">${SECTION_ICON[dept]}</div>
    <div>
      <div class="ddh-name">${SECTION_NAMES[dept]} Lv.${lvl.l}</div>
      <div class="ddh-lvl">${lvl.l===8?DEPT_TITLE_L8[dept]:lvl.name}</div>
    </div>
  </div>`;
  if(next){
    const cur=(ST.deptXp[dept]||0)-lvl.xp;
    const need=next.xp-lvl.xp;
    const pct=Math.round(cur/need*100);
    html+=`<div class="kgi-row" style="margin-bottom:8px;">
      <div class="kgi-label">次のレベルまで</div>
      <div class="kgi-bar-wrap">
        <span class="kgi-coin" style="font-family:'DotGothic16',monospace;">${cur}/${need}</span>
        <div class="kgi-bar"><div class="kgi-fill green" style="width:${pct}%"></div></div>
      </div>
    </div>`;
  }else{
    html+=`<div class="kgi-row" style="margin-bottom:8px;text-align:center;">
      <div style="font-size:11px;color:var(--gold-d);font-weight:900;">⭐ 最大レベル達成 ⭐</div>
    </div>`;
  }
  const last=ST.history[ST.history.length-1];
  if(last){
    html+=`<div class="section-divider">最新月（${last.ym}）の${SECTION_NAMES[dept]}KPI</div>`;
    let any=false;
    KPI[dept].forEach(kpi=>{
      const v=last.values[kpi.id];
      const g=last.judges[kpi.id];
      if(v==null)return;
      any=true;
      html+=`<div class="kpi-mini">
        <span class="kpi-mini-name">${kpi.kgi?'⭐':''} ${kpi.name}</span>
        <span class="kpi-mini-val">${v}${kpi.u}</span>
        <span class="kpi-mini-judge j-${g}">${g}</span>
      </div>`;
    });
    if(!any){
      html+=`<div class="empty-msg" style="margin-top:6px;">この部門のKPIはまだ入力されていません</div>`;
    }
  }else{
    html+=`<div class="empty-msg" style="margin-top:8px;"><span class="em-icon">📊</span>月次決算を入力するとここに表示されます</div>`;
  }
  document.getElementById('modal-body').innerHTML=html;
  document.getElementById('modal').classList.add('show');
}

/* ════════════════════════════════════════════
   ナビ・初期化
═════════════════════════════════════════════ */
function switchPage(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.page===page));
  if(page==='input')setupInputPage();
  if(page==='quest')renderQuestPage();
  if(page==='history')renderHistoryPage();
  if(page==='home')renderTop();
}

function init(){
  loadState();
  renderTop();

  document.querySelectorAll('.nav-btn').forEach(b=>{
    b.addEventListener('click',()=>switchPage(b.dataset.page));
  });
  document.querySelectorAll('.section-tab button').forEach(b=>{
    b.addEventListener('click',()=>{
      curSection=b.dataset.sec;
      setupInputPage();
    });
  });
  document.getElementById('btn-confirm').addEventListener('click',confirmMonth);
  document.getElementById('btn-cancel').addEventListener('click',()=>{
    if(Object.keys(ST.pendingValues).length===0||confirm('入力中の値を破棄しますか？')){
      ST.pendingValues={};
      switchPage('home');
    }
  });
  document.querySelectorAll('.dept-pill').forEach(el=>{
    el.addEventListener('click',()=>showDeptDetail(el.dataset.dept));
  });
  document.querySelectorAll('.dsc').forEach(el=>{
    el.addEventListener('click',()=>showDeptDetail(el.dataset.dept));
  });
  document.getElementById('modal-close').addEventListener('click',()=>{
    document.getElementById('modal').classList.remove('show');
  });
  document.getElementById('modal').addEventListener('click',e=>{
    if(e.target.id==='modal')document.getElementById('modal').classList.remove('show');
  });
  document.getElementById('rankup-ok').addEventListener('click',()=>{
    document.getElementById('rankup-mask').classList.remove('show');
  });
}

init();
</script>
